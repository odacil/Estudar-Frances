<div id="root">
  <div id="fr-fallback" style="padding:2rem;font-family:system-ui;color:#1a2138;text-align:center;max-width:600px;margin:0 auto">
    <h1 style="color:#0055A4">🇫🇷 Estudar Francês</h1>
    <p style="color:#7e879a">A carregar… se ficar mais de 5 segundos assim, há um problema. Abre a consola do browser (F12 ou Cmd+Option+I no Mac) e mostra-me o erro em vermelho.</p>
    <p style="color:#7e879a;font-size:0.85rem">Verifica também a tua ligação — o app usa React/Babel de CDN.</p>
  </div>
</div>
<script>
  // Mostra erros ao utilizador em vez de página branca
  window.addEventListener('error', function(e) {
    var fb = document.getElementById('fr-fallback');
    if (fb) {
      fb.innerHTML = '<h1 style="color:#c1281f">⚠️ Erro a carregar o app</h1>' +
        '<p style="color:#1a2138">' + (e.message || 'erro desconhecido') + '</p>' +
        '<pre style="background:#fbf8f0;padding:1rem;border-radius:8px;text-align:left;font-size:0.85rem;overflow:auto">' +
        (e.filename ? e.filename + ':' + e.lineno + ':' + e.colno + '\n' : '') +
        (e.error && e.error.stack ? e.error.stack : '') +
        '</pre>' +
        '<p style="color:#7e879a">Por favor envia este erro para podermos corrigir.</p>';
    }
  });
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

// ==================== STORAGE ====================
const storage = {
  get(key) { return localStorage.getItem(key); },
  set(key, value) { localStorage.setItem(key, value); },
  delete(key) { localStorage.removeItem(key); }
};

// ==================== TTS (TEXT-TO-SPEECH) ====================
// SÓ fala em francês. Se não houver voz francesa no sistema, não fala (em vez de cair na voz default = português).
let _lastSpeak = 0;
let _noVoiceWarned = false;
function pickFrenchVoice() {
  if (typeof speechSynthesis === 'undefined') return null;
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  return voices.find(v => /thomas|amelie|amélie|aurélie|aurelie|virginie|nicolas|jean-pierre|chantal|marie/i.test(v.name) && /^fr/i.test(v.lang))
      || voices.find(v => v.lang === 'fr-FR' && v.localService)
      || voices.find(v => v.lang === 'fr-FR')
      || voices.find(v => v.lang === 'fr-CA')
      || voices.find(v => /^fr/i.test(v.lang))
      || null;
}
function _doSpeak(text) {
  if (!text || typeof speechSynthesis === 'undefined') return;
  const voice = pickFrenchVoice();
  if (!voice) {
    if (!_noVoiceWarned) {
      _noVoiceWarned = true;
      console.warn('[TTS] Nenhuma voz francesa instalada. Para ouvir pronúncia em francês, instala uma voz fr-FR nas Definições do macOS → Acessibilidade → Conteúdo Falado → Vozes do Sistema → Francês (Thomas/Amélie).');
      // Mostra alerta UI uma vez
      try {
        const div = document.createElement('div');
        div.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#c1281f;color:#fff;padding:12px 18px;border-radius:8px;font:14px system-ui;max-width:340px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.3)';
        div.innerHTML = '🔊 <b>Sem voz francesa instalada</b><br>Vai a Definições → Acessibilidade → Conteúdo Falado → Vozes do Sistema → adiciona "Thomas" ou "Amélie" (Francês). <button style="background:#fff;color:#c1281f;border:0;padding:4px 10px;border-radius:4px;margin-top:8px;cursor:pointer" onclick="this.parentNode.remove()">OK</button>';
        document.body.appendChild(div);
        setTimeout(() => { if (div.parentNode) div.remove(); }, 12000);
      } catch(e) {}
    }
    return;
  }
  // Cancela QUALQUER fala em curso (incluindo da voz default que possa estar a iniciar)
  speechSynthesis.cancel();
  const clean = String(text).replace(/\*+/g, '').replace(/\([^)]*\)/g, '').replace(/\/[^\/]*$/, '').trim();
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.voice = voice;
  u.lang = voice.lang; // usa o lang da voz selecionada (não 'fr-FR' fixo, que poderia ativar fallback)
  u.rate = 0.9;
  u.pitch = 1;
  // Speak imediato — sem setTimeout (evita queue duplo)
  speechSynthesis.speak(u);
}
function speak(text) {
  if (typeof speechSynthesis === 'undefined') return;
  // Throttle: ignora cliques duplos rápidos (< 200ms)
  const now = Date.now();
  if (now - _lastSpeak < 200) return;
  _lastSpeak = now;
  // Se as vozes ainda não estão carregadas, espera uma vez
  if (speechSynthesis.getVoices().length === 0) {
    let tries = 0;
    const wait = () => {
      if (speechSynthesis.getVoices().length > 0 || tries >= 20) _doSpeak(text);
      else { tries++; setTimeout(wait, 100); }
    };
    wait();
  } else {
    _doSpeak(text);
  }
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => { /* nothing — pickFrenchVoice lê o estado atual */ };
}
function SpeakBtn({ text, size }) {
  const cls = "fr-speak-btn" + (size === 'big' ? ' fr-speak-big' : '');
  return (
    <button className={cls} onClick={(e) => { e.stopPropagation(); speak(text); }} title="Ouvir pronúncia" aria-label="Ouvir">
      🔊
    </button>
  );
}

function conjugarRegular(verbo) {
  const grupo = verbo.grupo, r = verbo.inf;
  if (grupo === 1) {
    const raiz = r.replace(/er$/, '');
    const isGer = raiz.endsWith('g');
    const isCer = raiz.endsWith('c');
    const presNous = isGer ? raiz + "eons" : (isCer ? raiz.slice(0,-1) + "çons" : raiz + "ons");
    return {
      presente: { je: raiz+"e", tu: raiz+"es", il: raiz+"e", nous: presNous, vous: raiz+"ez", ils: raiz+"ent" },
      passado: { je: "ai "+raiz+"é", tu: "as "+raiz+"é", il: "a "+raiz+"é", nous: "avons "+raiz+"é", vous: "avez "+raiz+"é", ils: "ont "+raiz+"é" },
      imparfait: { je: raiz+"ais", tu: raiz+"ais", il: raiz+"ait", nous: raiz+"ions", vous: raiz+"iez", ils: raiz+"aient" },
      futuro: { je: raiz+"erai", tu: raiz+"eras", il: raiz+"era", nous: raiz+"erons", vous: raiz+"erez", ils: raiz+"eront" }
    };
  }
  if (grupo === 2) {
    const raiz = r.replace(/ir$/, '');
    return {
      presente: { je: raiz+"is", tu: raiz+"is", il: raiz+"it", nous: raiz+"issons", vous: raiz+"issez", ils: raiz+"issent" },
      passado: { je: "ai "+raiz+"i", tu: "as "+raiz+"i", il: "a "+raiz+"i", nous: "avons "+raiz+"i", vous: "avez "+raiz+"i", ils: "ont "+raiz+"i" },
      imparfait: { je: raiz+"issais", tu: raiz+"issais", il: raiz+"issait", nous: raiz+"issions", vous: raiz+"issiez", ils: raiz+"issaient" },
      futuro: { je: raiz+"irai", tu: raiz+"iras", il: raiz+"ira", nous: raiz+"irons", vous: raiz+"irez", ils: raiz+"iront" }
    };
  }
  return null;
}
function conjugar(verbo) { return CONJ_IRREG[verbo.inf] || conjugarRegular(verbo); }

function traduzirNumero(n) {
  if (n < 0 || n > 9999) return null;
  if (n === 0) return "zéro";
  function souscent(x) {
    // 1..99
    const u = ["", "un", "deux", "trois", "quatre", "cinq", "six", "sept", "huit", "neuf"];
    const t10 = ["dix", "onze", "douze", "treize", "quatorze", "quinze", "seize", "dix-sept", "dix-huit", "dix-neuf"];
    const t = ["", "", "vingt", "trente", "quarante", "cinquante", "soixante"];
    if (x < 10) return u[x];
    if (x < 20) return t10[x - 10];
    if (x < 70) {
      const d = Math.floor(x / 10), un = x % 10;
      if (un === 0) return t[d];
      if (un === 1) return t[d] + " et un";
      return t[d] + "-" + u[un];
    }
    if (x < 80) {
      const rest = x - 60;
      if (rest === 11) return "soixante et onze";
      if (rest === 10) return "soixante-dix";
      return "soixante-" + t10[rest - 10];
    }
    // 80..99
    const rest = x - 80;
    if (rest === 0) return "quatre-vingts";
    if (rest < 10) return "quatre-vingt-" + u[rest];
    return "quatre-vingt-" + t10[rest - 10];
  }
  function centaines(x, ehFinal) {
    // 1..999 -> string. ehFinal = true se for o último bloco da frase (afeta plural de cent)
    if (x === 0) return "";
    if (x < 100) return souscent(x);
    const c = Math.floor(x / 100), r = x % 100;
    if (c === 1) {
      if (r === 0) return "cent";
      return "cent " + souscent(r);
    }
    const u = ["", "un", "deux", "trois", "quatre", "cinq", "six", "sept", "huit", "neuf"];
    if (r === 0) return u[c] + (ehFinal ? " cents" : " cent");
    return u[c] + " cent " + souscent(r);
  }
  if (n < 1000) return centaines(n, true);
  // 1000..9999
  const milhares = Math.floor(n / 1000), resto = n % 1000;
  let pref;
  if (milhares === 1) pref = "mille";
  else {
    const u = ["", "un", "deux", "trois", "quatre", "cinq", "six", "sept", "huit", "neuf"];
    pref = u[milhares] + " mille";
  }
  if (resto === 0) return pref;
  return pref + " " + centaines(resto, true);
}

const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

function useNoRepeat(pool, historyCap) {
  const cap = historyCap || Math.max(3, Math.floor(pool.length / 2));
  const histRef = useRef([]);
  const next = () => {
    if (!pool.length) return null;
    const avail = pool.filter(p => !histRef.current.includes(p.fr));
    const arr = avail.length ? avail : pool;
    const pick = arr[Math.floor(Math.random() * arr.length)];
    histRef.current.push(pick.fr);
    if (histRef.current.length > cap) histRef.current.shift();
    return pick;
  };
  const nextN = (n) => shuffle(pool).slice(0, n);
  return { next, nextN };
}

function dicaInteligente(target) {
  const word = target.fr.split(/[\/,]/)[0].trim();
  const first = word.charAt(0);
  const masked = first + word.slice(1).replace(/[^\s]/g, '_');
  return {
    texto: 'Começa por "' + first + '" · ' + word.length + ' letras',
    palavra: masked
  };
}

function imgUrl(fr, width, height) {
  const key = IMG_KEYS[fr];
  if (!key) return null;
  const w = width || 400, h = height || 280;
  // Pollinations.ai gera imagens AI on-the-fly. Não precisa API key. Sempre funciona.
  // Limpa o prompt e adiciona um seed consistente por palavra para imagens reprodutíveis.
  const prompt = key.replace(/,/g, ' ') + ', photo realistic, simple background, centered';
  const seed = Math.abs(fr.split('').reduce((a, c) => a + c.charCodeAt(0), 0)) % 99999;
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt) +
    '?width=' + w + '&height=' + h + '&nologo=true&seed=' + seed + '&model=flux';
}

// ==================== COMPONENTES ====================
function App() {
  const [view, setView] = useState('home');
  const [selectedAulaN, setSelectedAulaN] = useState(null);
  const [progress, setProgress] = useState({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 } });
  const [userName, setUserNameState] = useState('');
  const [userLevel, setUserLevelState] = useState(null);
  const [showNamePrompt, setShowNamePrompt] = useState(false);
  const [showLevelPrompt, setShowLevelPrompt] = useState(false);

  useEffect(() => {
    const p = storage.get('fr_progress');
    if (p) try { setProgress({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 }, ...JSON.parse(p) }); } catch(e) {}
    const n = storage.get('fr_userName');
    const l = storage.get('fr_userLevel');
    if (n) setUserNameState(n); else setShowNamePrompt(true);
    if (l !== null && l !== undefined) setUserLevelState(parseInt(l, 10));
    else if (n) setShowLevelPrompt(true);
  }, []);

  const setUserName = (n) => { setUserNameState(n); storage.set('fr_userName', n); };
  const setUserLevel = (l) => { setUserLevelState(l); storage.set('fr_userLevel', l); };
  const saveProgress = (np) => { setProgress(np); storage.set('fr_progress', JSON.stringify(np)); };
  const markCard = (key) => {
    if (!progress.studiedCards.includes(key)) saveProgress({ ...progress, studiedCards: [...progress.studiedCards, key] });
  };
  const recordQuiz = (score, total) => saveProgress({ ...progress, quizScores: [...progress.quizScores, { score, total, date: new Date().toISOString() }] });
  const recordTreino = (acerto) => saveProgress({ ...progress, treinoStats: { correct: progress.treinoStats.correct + (acerto?1:0), total: progress.treinoStats.total + 1 } });
  const resetAll = () => { storage.delete('fr_progress'); setProgress({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 } }); };

  const level = userLevel === null || userLevel === undefined ? 0 : userLevel;
  const openLevel = () => setShowLevelPrompt(true);

  return (
    <div className="fr-app">
      <style dangerouslySetInnerHTML={{__html: STYLES}} />
      {showNamePrompt && <NamePrompt onSave={(n) => { setUserName(n); setShowNamePrompt(false); setShowLevelPrompt(true); }} />}
      {!showNamePrompt && showLevelPrompt && (
        <LevelPrompt currentLevel={userLevel} onSave={(l) => { setUserLevel(l); setShowLevelPrompt(false); }} onClose={() => { if (userLevel === null || userLevel === undefined) setUserLevel(0); setShowLevelPrompt(false); }} />
      )}
      <Header view={view} setView={(v) => { setView(v); setSelectedAulaN(null); }} />
      <main className="fr-main">
        {view === 'home' && <Home setView={setView} progress={progress} userName={userName} userLevel={level} setUserName={setUserName} openLevel={openLevel} setSelectedAulaN={(n) => { setSelectedAulaN(n); setView('aula'); }} />}
        {view === 'aulas' && <AulasList userLevel={level} setSelectedAulaN={(n) => { setSelectedAulaN(n); setView('aula'); }} openLevel={openLevel} />}
        {view === 'aula' && selectedAulaN !== null && <AulaDetail aula={AULAS[selectedAulaN]} back={() => setView('aulas')} userLevel={level} isLocked={selectedAulaN > level} setSelectedAulaN={setSelectedAulaN} openLevel={openLevel} setUserLevel={setUserLevel} />}
        {view === 'flashcards' && <Flashcards markCard={markCard} studied={progress.studiedCards} userLevel={level} openLevel={openLevel} />}
        {view === 'quiz' && <Quiz recordQuiz={recordQuiz} userLevel={level} openLevel={openLevel} />}
        {view === 'dicionario' && <Dicionario userLevel={level} openLevel={openLevel} />}
        {view === 'verbos' && <Verbos userLevel={level} openLevel={openLevel} />}
        {view === 'frases' && <Frases userLevel={level} openLevel={openLevel} />}
        {view === 'treino' && <Treino userLevel={level} recordTreino={recordTreino} openLevel={openLevel} />}
        {view === 'musica' && <Musicas userLevel={level} openLevel={openLevel} />}
        {view === 'pronuncia' && <Pronuncia userLevel={level} openLevel={openLevel} />}
        {view === 'progresso' && <Progresso progress={progress} reset={resetAll} userLevel={level} openLevel={openLevel} />}
      </main>
      <footer className="fr-footer">
        <div className="fr-footer-greet">Bon courage! · À bientôt!</div>
        <div className="fr-footer-credits">Estudar Francês — feito por <strong>Odacil</strong> com a ajuda do <strong>Claude AI</strong>.</div>
      </footer>
    </div>
  );
}

function NamePrompt({ onSave }) {
  const [name, setName] = useState('');
  const submit = () => { if (name.trim()) onSave(name.trim()); };
  return (
    <div className="fr-modal-bg">
      <div className="fr-modal">
        <div className="fr-modal-orn">◆ ◇ ◆</div>
        <h2 className="fr-modal-title">Bienvenue!</h2>
        <p className="fr-modal-sub">Bem-vindo ao estudo da língua francesa</p>
        <div style={{marginTop:'1.5rem',textAlign:'left'}}>
          <label className="fr-label">Comment vous appelez-vous? (Qual é o teu nome?)</label>
          <input className="fr-input" autoFocus value={name} onChange={e => setName(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') submit(); }} placeholder="Escreve o teu nome…" style={{width:'100%',marginTop:'0.4rem'}} />
        </div>
        <button className="fr-btn fr-btn-primary fr-btn-big" onClick={submit} disabled={!name.trim()} style={{marginTop:'1.25rem',width:'100%'}}>Continuer →</button>
      </div>
    </div>
  );
}

function LevelPrompt({ currentLevel, onSave, onClose }) {
  const [selected, setSelected] = useState(currentLevel);
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape' && onClose) onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);
  return (
    <div className="fr-modal-bg" onClick={() => { if (onClose) onClose(); }}>
      <div className="fr-modal fr-modal-wide" onClick={e => e.stopPropagation()}>
        <button className="fr-modal-close" onClick={onClose} title="Fechar (ESC)" aria-label="Fechar">×</button>
        <div className="fr-modal-orn">◆ ◇ ◆</div>
        <h2 className="fr-modal-title">Até onde chegaste?</h2>
        <p className="fr-modal-sub">Escolhe o módulo em que estás.<br/>Só vais ver conteúdo até esse ponto (podes desbloquear depois).</p>
        <div className="fr-level-grid">
          {AULAS.map((a) => (
            <button key={a.n} className={`fr-level-option ${selected === a.n ? 'active' : ''}`} onClick={() => setSelected(a.n)}>
              <div className="fr-level-num">Module {a.n + 1}</div>
              <div className="fr-level-titulo">{a.titulo}</div>
              <div className="fr-level-sub">{a.subtitulo}</div>
            </button>
          ))}
        </div>
        <div style={{marginTop:'1.25rem',display:'flex',gap:'0.5rem',justifyContent:'flex-end',flexWrap:'wrap'}}>
          <button className="fr-btn" onClick={onClose}>Cancelar</button>
          <button className="fr-btn fr-btn-primary" disabled={selected === null} onClick={() => onSave(selected)}>{selected !== null ? `Estudar até ao Module ${selected + 1}` : 'Escolhe um módulo'}</button>
        </div>
      </div>
    </div>
  );
}

function Header({ view, setView }) {
  const tabs = [
    { id: 'home', label: 'Início' },
    { id: 'aulas', label: 'Módulos' },
    { id: 'flashcards', label: 'Cards' },
    { id: 'treino', label: 'Treino' },
    { id: 'quiz', label: 'Quiz' },
    { id: 'verbos', label: 'Verbos' },
    { id: 'frases', label: 'Frases' },
    { id: 'dicionario', label: 'Dic.' },
    { id: 'musica', label: 'Música' },
    { id: 'pronuncia', label: 'Pronúncia' },
    { id: 'progresso', label: 'Prog.' }
  ];
  return (
    <header className="fr-header">
      <div className="fr-brand" onClick={() => setView('home')}>
        <div className="fr-brand-mark"><div className="fr-brand-mark-flag"><div/><div/><div/></div></div>
        <div>
          <h1 className="fr-brand-title">Français</h1>
          <p className="fr-brand-sub">Apprendre le français — Estudo prático</p>
        </div>
      </div>
      <nav className="fr-nav">
        {tabs.map(t => <button key={t.id} className={`fr-nav-btn ${view === t.id ? 'active' : ''}`} onClick={() => setView(t.id)}>{t.label}</button>)}
      </nav>
    </header>
  );
}

function PageHeader({ title, sub, userLevel, openLevel }) {
  return (
    <div className="fr-page-header">
      <div className="fr-page-header-info">
        <h2 className="fr-page-title">{title}</h2>
        {sub && <p className="fr-page-sub">{sub}</p>}
      </div>
      {openLevel && <button className="fr-level-pill" onClick={openLevel}>Module {userLevel + 1} · Mudar</button>}
    </div>
  );
}

function EmojiOrText({ value, size }) {
  if (typeof value === 'string' && value.startsWith('txt:')) {
    const txt = value.slice(4);
    const cls = size === 'big' ? 'fr-txt-emoji fr-txt-emoji-big' : (size === 'small' ? 'fr-txt-emoji fr-txt-emoji-small' : 'fr-txt-emoji');
    return <span className={cls}>{txt}</span>;
  }
  return <span>{value}</span>;
}

function Home({ setView, progress, userName, userLevel, setUserName, openLevel, setSelectedAulaN }) {
  const pool = vocabUpToAula(userLevel);
  const verbosD = VERBOS.filter(v => v.aula <= userLevel);
  const frasesD = FRASES.filter(f => f.aula <= userLevel);
  const studied = progress.studiedCards.length;
  const pct = pool.length > 0 ? Math.round((studied / pool.length) * 100) : 0;
  const last = progress.quizScores[progress.quizScores.length - 1];
  return (
    <div>
      <section className="fr-hero">
        <div className="fr-hero-orn">◆ ◇ ◆</div>
        <h2 className="fr-hero-title">Bonjour{userName ? `, ${userName}` : ''}!</h2>
        <p className="fr-hero-greet">{userName ? "Bem-vindo de volta ao teu estudo de francês." : "Bem-vindo ao estudo da língua francesa."}</p>
        <p className="fr-hero-sub">A estudar até ao Module {userLevel + 1} · {pool.length} palavras · {verbosD.length} verbos · {frasesD.length} frases</p>
        <div className="fr-hero-actions">
          {userName && <button className="fr-change-link" onClick={() => { const n = prompt("Novo nome:", userName); if (n && n.trim()) setUserName(n.trim()); }}>Mudar nome</button>}
          <button className="fr-change-link" onClick={openLevel}>Mudar módulo</button>
        </div>
      </section>
      <section className="fr-stats">
        <div className="fr-stat">
          <div className="fr-stat-value">{studied}/{pool.length}</div>
          <div className="fr-stat-label">Palavras vistas</div>
          <div className="fr-bar"><div className="fr-bar-fill" style={{width:`${pct}%`}} /></div>
          <div className="fr-stat-pct">{pct}%</div>
        </div>
        <div className="fr-stat">

function Flashcards({ markCard, studied, userLevel, openLevel }) {
  const [category, setCategory] = useState('all');
  const [direction, setDirection] = useState('fr-pt');
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [shuffleKey, setShuffleKey] = useState(0);

  const pool = useMemo(() => {
    const base = vocabUpToAula(userLevel);
    const filtered = category === 'all' ? base : base.filter(v => v.categoria === category);
    return shuffleKey >= 0 ? shuffle(filtered) : filtered;
  }, [category, userLevel, shuffleKey]);

  const cats = Array.from(new Set(vocabUpToAula(userLevel).map(v => v.categoria)));
  const card = pool[idx % Math.max(pool.length, 1)];

  useEffect(() => { setIdx(0); setFlipped(false); }, [category, direction, shuffleKey]);

  if (pool.length === 0) {
    return <div><PageHeader title="Flashcards" sub="Sem palavras nesta categoria." userLevel={userLevel} openLevel={openLevel} /></div>;
  }

  const next = () => { setFlipped(false); setIdx((idx + 1) % pool.length); if (card) markCard(card.fr); };
  const prev = () => { setFlipped(false); setIdx((idx - 1 + pool.length) % pool.length); };

  const frontText = direction === 'fr-pt' ? card.fr : card.pt;
  const backText = direction === 'fr-pt' ? card.pt : card.fr;
  const speakText = card.fr;

  return (
    <div>
      <PageHeader title="Flashcards" sub="Clica no cartão para virar. 🔊 toca a pronúncia em francês." userLevel={userLevel} openLevel={openLevel} />
      <div className="fr-controls">
        <div className="fr-control-group">
          <label className="fr-label">Categoria</label>
          <select className="fr-select" value={category} onChange={e => setCategory(e.target.value)}>
            <option value="all">Todas ({vocabUpToAula(userLevel).length})</option>
            {cats.map(c => <option key={c} value={c}>{c} ({vocabUpToAula(userLevel).filter(v=>v.categoria===c).length})</option>)}
          </select>
        </div>
        <div className="fr-control-group">
          <label className="fr-label">Direção</label>
          <div className="fr-toggle">
            <button className={direction === 'fr-pt' ? 'active' : ''} onClick={() => setDirection('fr-pt')}>FR → PT</button>
            <button className={direction === 'pt-fr' ? 'active' : ''} onClick={() => setDirection('pt-fr')}>PT → FR</button>
          </div>
        </div>
      </div>
      <div className="fr-flash-area">
        <div className="fr-flash-meta">
          <span className="fr-tag">{idx + 1} / {pool.length}</span>
          <span className="fr-tag-cat">{card.categoria}</span>
          <span className="fr-tag-cat">M{card.aula + 1}</span>
          <SpeakBtn text={speakText} />
        </div>
        <div className={`fr-flash ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(f => !f)}>
          <div className="fr-flash-inner">
            <div className="fr-flash-side fr-flash-front">
              <div className="fr-flash-emoji"><EmojiOrText value={card.emoji} size="big" /></div>
              <div className="fr-flash-hint">{direction === 'fr-pt' ? 'Français' : 'Português'}</div>
              <div className="fr-flash-text">{frontText}</div>
              <div className="fr-flash-tip">Clica para virar</div>
            </div>
            <div className="fr-flash-side fr-flash-back">
              <div className="fr-flash-hint">{direction === 'fr-pt' ? 'Português' : 'Français'}</div>
              <div className="fr-flash-text">{backText}</div>
            </div>
          </div>
        </div>
        <div className="fr-flash-nav">
          <button className="fr-btn" onClick={prev}>← Anterior</button>
          <button className="fr-btn" onClick={() => setShuffleKey(k => k + 1)}>🔀 Baralhar</button>
          <button className="fr-btn fr-btn-primary" onClick={next}>Seguinte →</button>
        </div>
      </div>
    </div>
  );
}

function Quiz({ recordQuiz, userLevel, openLevel }) {
  // Auto-start, mistura vocabulário + completar frase, auto-restart no fim
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [stage, setStage] = useState('playing'); // playing | done

  // Construir conjunto de 10 perguntas: ~6 vocab + ~4 completar (se disponíveis)
  const build = () => {
    const pool = vocabUpToAula(userLevel);
    if (pool.length < 4) return [];
    const exercPool = EXERCICIOS.filter(e => e.mod <= userLevel);
    const nExerc = Math.min(4, exercPool.length);
    const nVocab = 10 - nExerc;
    // Vocab questions — alternar direção aleatoriamente
    const vocabSample = shuffle(pool).slice(0, nVocab);
    const vocabQs = vocabSample.map(item => {
      const direction = Math.random() < 0.5 ? 'fr-pt' : 'pt-fr';
      const distractors = shuffle(pool.filter(v => v.fr !== item.fr)).slice(0, 3);
      const optsItems = shuffle([...distractors, item]);
      return {
        tipo: 'vocab',
        direction,
        prompt: direction === 'fr-pt' ? item.fr : item.pt,
        promptFr: item.fr,
        promptSpeak: direction === 'fr-pt' ? item.fr : null,
        correct: direction === 'fr-pt' ? item.pt : item.fr,
        correctFr: item.fr,
        options: optsItems.map(o => direction === 'fr-pt' ? o.pt : o.fr),
        explica: direction === 'fr-pt' ? null : item.fr + ' = ' + item.pt
      };
    });
    const exercQs = shuffle(exercPool).slice(0, nExerc).map(e => ({
      tipo: 'completar',
      prompt: e.frase,
      promptSpeak: e.frase.replace(/_+/g, '...'),
      correct: e.opcoes[e.a],
      options: e.opcoes,
      explica: e.expl
    }));
    return shuffle([...vocabQs, ...exercQs]);
  };

  const startNew = () => {
    const qs = build();
    setQuestions(qs); setCurrent(0); setScore(0); setSelected(null); setStage('playing');
  };
  useEffect(() => { startNew(); }, [userLevel]);

  const answer = opt => {
    if (selected) return;
    const q = questions[current];
    setSelected(opt);
    const acertou = opt === q.correct;
    if (acertou) {
      setScore(s => s + 1);
      // Speak correct French word for reinforcement
      if (q.tipo === 'vocab') speak(q.correctFr);
      else if (q.tipo === 'completar') speak(q.prompt.replace(/_+/g, q.correct));
    } else {
      // No erro: speak the correct French answer
      if (q.tipo === 'vocab') setTimeout(() => speak(q.correctFr), 300);
      else if (q.tipo === 'completar') setTimeout(() => speak(q.prompt.replace(/_+/g, q.correct)), 300);
    }
    setTimeout(() => nextQ(acertou), acertou ? 1500 : 2800);
  };
  const nextQ = (lastWasCorrect) => {
    if (current + 1 >= questions.length) {
      const finalScore = score + (lastWasCorrect ? 1 : 0);
      recordQuiz(finalScore, questions.length);
      setStage('done');
      // Auto-restart depois de 4 segundos
      setTimeout(() => { startNew(); }, 4500);
      return;
    }
    setCurrent(c => c + 1);
    setSelected(null);
  };

  if (!questions.length) {
    return <div><PageHeader title="Quiz" sub="Precisas de pelo menos 4 palavras desbloqueadas." userLevel={userLevel} openLevel={openLevel} /></div>;
  }

  if (stage === 'done') {
    const pct = Math.round((score / questions.length) * 100);
    let msg, emoji;
    if (pct === 100) { msg = "Parfait! Sabes tudo."; emoji = "🏆"; }
    else if (pct >= 90) { msg = "Excellent! Quase perfeito."; emoji = "⭐"; }
    else if (pct >= 70) { msg = "Très bien! Continua assim."; emoji = "👍"; }
    else if (pct >= 50) { msg = "Bon effort — revê os flashcards."; emoji = "📚"; }
    else { msg = "Pas de stress — pratica mais."; emoji = "💪"; }
    return (
      <div>
        <PageHeader title="Quiz" sub="A começar próximo quiz em segundos…" userLevel={userLevel} openLevel={openLevel} />
        <div className="fr-quiz-done">
          <div style={{fontSize:'3rem',marginBottom:'0.5rem'}}>{emoji}</div>
          <h2 className="fr-page-title" style={{textAlign:'center'}}>Résultat</h2>
          <div className="fr-result-score">{score}<span>/{questions.length}</span></div>
          <div className="fr-result-pct">{pct}%</div>
          <p className="fr-result-msg">{msg}</p>
          <p style={{color:'var(--mute)',fontSize:'0.9rem'}}>Próximo quiz daqui a 4s — ou clica para começar já</p>
          <div style={{display:'flex',gap:'0.5rem',justifyContent:'center',flexWrap:'wrap'}}>
            <button className="fr-btn fr-btn-primary" onClick={startNew}>▶ Novo quiz agora</button>
          </div>
        </div>
      </div>
    );
  }

  const q = questions[current];
  // Renderiza a frase com lacuna substituída por um placeholder visível
  const renderPrompt = () => {
    if (q.tipo === 'completar') {
      // Substitui _+ por um placeholder estilizado
      const parts = q.prompt.split(/_+/);
      return parts.map((p, i) => (
        <React.Fragment key={i}>
          {p}
          {i < parts.length - 1 && <span className="fr-quiz-blank">_____</span>}
        </React.Fragment>
      ));
    }
    return q.prompt;
  };
  return (
    <div>
      <PageHeader title="Quiz" sub={"Pergunta " + (current + 1) + " de " + questions.length + " · Acertos: " + score} userLevel={userLevel} openLevel={openLevel} />
      <div className="fr-quiz-meta"><span>{q.tipo === 'completar' ? '✍️ Completa a frase' : (q.direction === 'fr-pt' ? '🇫🇷→🇵🇹 Traduz' : '🇵🇹→🇫🇷 Como se diz')}</span><span>Acertos: {score}</span></div>
      <div className="fr-quiz-bar"><div className="fr-quiz-bar-fill" style={{width:(current / questions.length * 100) + '%'}} /></div>
      <div className="fr-quiz-card">
        <div className="fr-quiz-hint">
          {q.tipo === 'completar' ? 'Escolhe a palavra que preenche correctamente:' : (q.direction === 'fr-pt' ? 'Qual é a tradução de:' : 'Qual é a tradução em francês?')}
        </div>
        <div className="fr-quiz-prompt">
          <span>{renderPrompt()}</span>
          {q.promptSpeak && <SpeakBtn text={q.promptSpeak} />}
        </div>
        <div className="fr-quiz-options">
          {q.options.map((opt, i) => {
            const correct = selected && opt === q.correct;
            const wrong = selected === opt && opt !== q.correct;
            return (
              <button key={i} className={'fr-quiz-option' + (correct?' correct':'') + (wrong?' wrong':'') + (selected?' disabled':'')} onClick={() => answer(opt)} disabled={!!selected}>
                <span>{String.fromCharCode(65 + i)}. {opt}</span>
                {/* Botão TTS por opção quando a opção está em francês (PT→FR) ou completar */}
                {(q.direction === 'pt-fr' || q.tipo === 'completar') && (
                  <span style={{marginLeft:'auto'}} onClick={(e) => { e.stopPropagation(); speak(opt); }}>
                    <span className="fr-speak-btn fr-speak-inline" title="Ouvir esta opção">🔊</span>
                  </span>
                )}
              </button>
            );
          })}
        </div>
        {selected && q.explica && (
          <div style={{marginTop:'1rem',padding:'0.75rem 1rem',background:'rgba(200,156,79,0.12)',border:'1px dashed var(--gold)',borderRadius:'6px',fontSize:'0.9rem',color:'var(--ink-soft)'}}>
            💡 {q.explica}
          </div>
        )}
      </div>
    </div>
  );
}

function Dicionario({ userLevel, openLevel }) {
  const [search, setSearch] = useState('');
  const [flipped, setFlipped] = useState({});
  const base = vocabUpToAula(userLevel);
  const filtered = base.filter(v => {
    const s = search.toLowerCase().trim();
    if (!s) return true;
    return v.fr.toLowerCase().includes(s) || v.pt.toLowerCase().includes(s);
  });
  return (
    <div>
      <PageHeader title="Dicionário" sub="Clica num cartão para virar. 🔊 toca a pronúncia." userLevel={userLevel} openLevel={openLevel} />
      <div className="fr-controls">
        <input className="fr-input" placeholder="Procurar palavra (FR ou PT)…" value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      <div className="fr-dic-count">{filtered.length} de {base.length} palavras</div>
      <div className="fr-dic-list">
        {filtered.length === 0 && <div className="fr-empty">Sem resultados para "{search}".</div>}
        {filtered.map((v, i) => {
          const isFlip = flipped[v.fr];
          return (
            <div key={i} className={`fr-dic-card ${isFlip ? 'flipped' : ''}`} onClick={() => setFlipped(f => ({...f, [v.fr]: !f[v.fr]}))}>
              <span className="fr-dic-card-aula">A{v.aula}</span>
              <div className="fr-dic-card-speak"><SpeakBtn text={v.fr} /></div>
              <div className="fr-dic-card-emoji"><EmojiOrText value={v.emoji} /></div>
              <div className="fr-dic-card-text">{isFlip ? v.pt : v.fr}</div>
              <div className="fr-dic-card-flip-hint">{isFlip ? '↩ FR' : '👆 PT'}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Verbos({ userLevel, openLevel }) {
  const verbos = VERBOS.filter(v => v.aula <= userLevel);
  const [selected, setSelected] = useState(verbos[0] ? verbos[0].inf : null);
  if (!verbos.length) return <div><PageHeader title="Verbos" sub="Avança nas aulas para desbloquear." userLevel={userLevel} openLevel={openLevel} /></div>;
  const verboObj = verbos.find(v => v.inf === selected) || verbos[0];
  const conj = conjugar(verboObj);
  const tempos = [
    { key: 'presente', titulo: 'Présent', pt: 'Presente' },
    { key: 'passado', titulo: 'Passé composé', pt: 'Passado' },
    { key: 'imparfait', titulo: 'Imparfait', pt: 'Imperfeito' },
    { key: 'futuro', titulo: 'Futur simple', pt: 'Futuro' }
  ];
  const pronomes = [
    { key: 'je', label: 'Je' },
    { key: 'tu', label: 'Tu' },
    { key: 'il', label: 'Il/Elle' },
    { key: 'nous', label: 'Nous' },
    { key: 'vous', label: 'Vous' },
    { key: 'ils', label: 'Ils/Elles' }
  ];
  return (
    <div>
      <PageHeader title="Verbos & Conjugações" sub="Presente, passé composé, imparfait e futuro. 🔊 ouve cada forma." userLevel={userLevel} openLevel={openLevel} />
      <h3 className="fr-section-title">Verbos disponíveis ({verbos.length})</h3>
      <div className="fr-verbos-list">
        {verbos.map(v => (
          <button key={v.inf} className={`fr-verbo-chip ${selected === v.inf ? 'active' : ''}`} onClick={() => setSelected(v.inf)}>
            <span className="fr-verbo-inf">{v.inf}</span>
            <span className="fr-verbo-pt">{v.pt} · grupo {v.grupo}</span>
          </button>
        ))}
      </div>
      {conj && (
        <div className="fr-conj-detail">
          <h3 className="fr-section-title" style={{marginTop:0}}>
            <span className="fr-conj-speak-row">{verboObj.inf} ({verboObj.pt}) <SpeakBtn text={verboObj.inf} /></span>
          </h3>
          <div className="fr-conj-grid">

function TreinoEmoji({ pool, recordTreino }) {
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const [showHint, setShowHint] = useState(false);
  // Só itens com imagem real disponível (definidos em IMG_KEYS)
  const visualPool = useMemo(() => pool.filter(v => IMG_KEYS[v.fr]), [pool]);
  const { next: nextTarget } = useNoRepeat(visualPool);
  const gerar = () => {
    if (visualPool.length < 4) return;
    const target = nextTarget();
    if (!target) return;
    const distractors = shuffle(pool.filter(v => v.fr !== target.fr)).slice(0, 3);
    const options = shuffle([...distractors, target]);
    setQ({ target, options, dica: dicaInteligente(target) });
    setPicked(null); setShowHint(false);
  };
  useEffect(() => { gerar(); }, []);
  if (visualPool.length < 4) {
    return <div className="fr-treino-card"><p>Sem palavras com imagem suficientes neste módulo. Avança para um módulo seguinte para desbloqueares mais vocabulário visual.</p></div>;
  }
  if (!q) return null;
  const escolher = (opt) => {
    if (picked) return;
    setPicked(opt.fr);
    recordTreino(opt.fr === q.target.fr);
    if (opt.fr === q.target.fr) speak(q.target.fr);
    setTimeout(() => gerar(), 1700);
  };
  const url = imgUrl(q.target.fr, 360, 280);
  return (
    <div className="fr-treino-card">
      <div className="fr-treino-img-wrap">
        {url ? (
          <img src={url} alt="" className="fr-treino-img" referrerPolicy="no-referrer"
            onError={(e) => { e.target.style.display='none'; }} />
        ) : (
          <div className="fr-treino-emoji-big"><EmojiOrText value={q.target.emoji} size="big" /></div>
        )}
      </div>
      <p className="fr-treino-question">Que palavra é esta em francês?</p>
      {showHint ? (
        <div className="fr-treino-hint-shown">💡 {q.dica.texto}<div className="fr-dica-palavra">{q.dica.palavra}</div></div>
      ) : !picked && <button className="fr-btn fr-btn-small fr-hint-btn" onClick={() => setShowHint(true)}>💡 Mostrar dica</button>}
      <div className="fr-quiz-options" style={{maxWidth:'460px',margin:'1rem auto 0'}}>
        {q.options.map((opt, i) => {
          const correct = picked && opt.fr === q.target.fr;
          const wrong = picked === opt.fr && opt.fr !== q.target.fr;
          return (
            <button key={i} className={`fr-quiz-option ${correct?'correct':''} ${wrong?'wrong':''} ${picked?'disabled':''}`} onClick={() => escolher(opt)} disabled={!!picked}>
              {opt.fr}
            </button>
          );
        })}
      </div>
      {picked && (
        <div className={`fr-treino-feedback ${picked === q.target.fr ? 'correct' : 'wrong'}`}>
          {picked === q.target.fr ? '✓ Boa!' : `✗ Era: ${q.target.fr}`}
          <SpeakBtn text={q.target.fr} />
          <small>{q.target.fr} = {q.target.pt}</small>
        </div>
      )}
      <div className="fr-treino-actions">
        <button className="fr-btn" onClick={gerar}>{picked ? 'Próxima →' : '⏭️ Saltar'}</button>
      </div>
    </div>
  );
}

function TreinoWrite({ pool, recordTreino }) {
  const [q, setQ] = useState(null);
  const [valor, setValor] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const { next } = useNoRepeat(pool);
  const gerar = () => { const t = next(); if (!t) return; setQ({...t, dica: dicaInteligente(t)}); setValor(''); setFeedback(null); setShowHint(false); };
  useEffect(() => { gerar(); }, []);
  if (!q) return null;
  const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z]/g, '').trim();
  const verificar = () => {
    if (!valor.trim()) return;
    const variantes = q.fr.split(/[\/,]/).map(s => normalizar(s));
    const resp = normalizar(valor);
    const acertou = variantes.includes(resp);
    setFeedback(acertou ? 'correct' : 'wrong');
    recordTreino(acertou);
    if (acertou) speak(q.fr);
    setTimeout(() => gerar(), 2500);
  };
  return (
    <div className="fr-treino-card">
      {typeof q.emoji === 'string' && !q.emoji.startsWith('txt:') && <div className="fr-treino-emoji-big">{q.emoji}</div>}

      {showHint ? (
        <div className="fr-treino-hint-shown">💡 {q.dica.texto}<div className="fr-dica-palavra">{q.dica.palavra}</div></div>
      ) : !feedback && <button className="fr-btn fr-btn-small fr-hint-btn" onClick={() => setShowHint(true)}>💡 Dica</button>}
      <input className="fr-treino-input" autoFocus value={valor} onChange={e => setValor(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !feedback) verificar(); }} placeholder="escreve em francês…" disabled={!!feedback} />
      {feedback && (
        <div className={`fr-treino-feedback ${feedback}`}>
          {feedback === 'correct' ? '✓ Correto!' : `✗ Resposta: ${q.fr}`}
          <SpeakBtn text={q.fr} />
          <small>{q.fr} = {q.pt}</small>
        </div>
      )}
      <div className="fr-treino-actions">
        {!feedback && (
          <React.Fragment>
            <button className="fr-btn fr-btn-primary" onClick={verificar} disabled={!valor.trim()}>Confirmar</button>
            <button className="fr-btn" onClick={gerar}>⏭️ Saltar</button>
          </React.Fragment>

  );
}

function TreinoMatch({ pool, recordTreino }) {
  // 2 colunas (FR à esquerda, PT à direita), cada uma com a sua ordem aleatória.
  // GARANTIDO: o par correto NUNCA aparece na mesma linha.
  const [pares, setPares] = useState([]);
  const [colFR, setColFR] = useState([]);
  const [colPT, setColPT] = useState([]);
  const [selFR, setSelFR] = useState(null); // key (fr) selecionada na coluna FR
  const [selPT, setSelPT] = useState(null); // key (fr) selecionada na coluna PT
  const [matched, setMatched] = useState({});
  const [wrong, setWrong] = useState(null);
  const { nextN } = useNoRepeat(pool);
  const N = 5; // 5 pares por ronda
  const gerar = () => {
    const escolhidos = nextN(N);
    if (escolhidos.length < N) return;
    setPares(escolhidos);
    // Ordem aleatória em cada coluna, MAS as posições não podem coincidir
    let frOrder = shuffle(escolhidos.map(p => p.fr));
    let ptOrder = shuffle(escolhidos.map(p => p.fr));
    let tries = 0;
    while (tries++ < 50) {
      // Verifica se há alguma linha onde FR[i] e PT[i] são do mesmo par (mesmo key)
      let conflito = -1;
      for (let i = 0; i < frOrder.length; i++) {
        if (frOrder[i] === ptOrder[i]) { conflito = i; break; }
      }
      if (conflito === -1) break;
      // Troca o item em conflito com outra posição aleatória da coluna PT
      const swapWith = (conflito + 1 + Math.floor(Math.random() * (ptOrder.length - 1))) % ptOrder.length;
      [ptOrder[conflito], ptOrder[swapWith]] = [ptOrder[swapWith], ptOrder[conflito]];
    }
    setColFR(frOrder);
    setColPT(ptOrder);
    setSelFR(null); setSelPT(null); setMatched({}); setWrong(null);
  };
  useEffect(() => { gerar(); }, []);
  useEffect(() => {
    if (selFR && selPT) {
      if (selFR === selPT) {
        setMatched(m => ({...m, [selFR]: true}));
        recordTreino(true);
        speak(selFR);
        setSelFR(null); setSelPT(null);
      } else {
        recordTreino(false);
        setWrong({ fr: selFR, pt: selPT });
        setTimeout(() => { setSelFR(null); setSelPT(null); setWrong(null); }, 700);
      }
    }
  }, [selFR, selPT]);
  const totMatch = Object.keys(matched).length;
  const completo = totMatch === pares.length && pares.length > 0;
  useEffect(() => {
    if (completo) {
      const t = setTimeout(() => gerar(), 1800);
      return () => clearTimeout(t);
    }
  }, [completo]);
  // Lookup helper: dado um key fr, retorna a tradução PT
  const ptOf = (frKey) => { const p = pares.find(x => x.fr === frKey); return p ? p.pt : ''; };
  return (
    <div className="fr-treino-card" style={{textAlign:'left'}}>
      <p style={{textAlign:'center',color:'var(--mute)',fontSize:'0.92rem',marginTop:0}}>
        Liga cada palavra em <strong style={{color:'var(--accent)'}}>francês</strong> à sua tradução em <strong>português</strong>. Os pares NÃO estão alinhados na mesma linha.
      </p>
      <div className="fr-match-grid">
        <div className="fr-match-col-head">Français</div>
        <div className="fr-match-col-head">Português</div>
        {colFR.map((frKey, idx) => {
          const ptKey = colPT[idx];
          if (!ptKey) return null;
          const frMatched = matched[frKey], frSel = selFR === frKey, frWrong = wrong && wrong.fr === frKey;
          const ptMatched = matched[ptKey], ptSel = selPT === ptKey, ptWrong = wrong && wrong.pt === ptKey;
          return (
            <React.Fragment key={idx}>
              <button className={'fr-match-cell fr' + (frMatched?' matched':'') + (frSel?' selected':'') + (frWrong?' wrong':'')}
                disabled={frMatched} onClick={() => !frMatched && setSelFR(frKey)}>
                <span className="fr-match-text">{frKey}</span>
              </button>
              <button className={'fr-match-cell pt' + (ptMatched?' matched':'') + (ptSel?' selected':'') + (ptWrong?' wrong':'')}
                disabled={ptMatched} onClick={() => !ptMatched && setSelPT(ptKey)}>
                <span className="fr-match-text">{ptOf(ptKey)}</span>
              </button>
            </React.Fragment>
          );
        })}
      </div>
      <div style={{textAlign:'center',marginTop:'1rem'}}>
        <p style={{color:'var(--mute)',fontSize:'0.85rem'}}>{totMatch}/{pares.length} pares</p>
        {completo && <p style={{color:'var(--correct)',fontWeight:600,marginBottom:'0.85rem'}}>✓ Très bien! Próxima ronda…</p>}
        <button className="fr-btn" onClick={gerar}>{completo ? 'Próxima →' : '🔄 Nova ronda'}</button>
      </div>
    </div>
  );
}

function TreinoNumeros({ recordTreino, userLevel }) {
  const [mode, setMode] = useState('fr-num');
  const [range, setRange] = useState(99);
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const histRef = useRef([]);
  const gerar = () => {
    let n;
    let tries = 0;
    do { n = Math.floor(Math.random() * (range + 1)); tries++; } while (histRef.current.includes(n) && tries < 30);
    histRef.current.push(n); if (histRef.current.length > 8) histRef.current.shift();
    const correctFr = traduzirNumero(n);
    // Gerar distractors "próximos" para serem mais desafiantes
    const distractors = [];
    let tr = 0;
    while (distractors.length < 3 && tr < 200) {
      tr++;
      let d;
      // metade dos casos: número totalmente aleatório; outra metade: perto do número alvo
      if (Math.random() < 0.5) {
        d = Math.floor(Math.random() * (range + 1));
      } else {
        const delta = (Math.random() < 0.5 ? -1 : 1) * (1 + Math.floor(Math.random() * 11));
        d = n + delta;
      }
      if (d < 0 || d > range) continue;
      if (d !== n && !distractors.includes(d)) distractors.push(d);
    }
    const options = shuffle([n, ...distractors]);
    setQ({ n, correctFr, options });
    setPicked(null);
  };
  useEffect(() => { gerar(); }, [range, mode]);
  if (!q) return null;
  const escolher = (val) => {
    if (picked !== null) return;
    setPicked(val);
    const acerto = val === q.n;
    recordTreino(acerto);
    if (acerto) speak(q.correctFr);
    setTimeout(() => gerar(), 1500);
  };
  return (
    <div className="fr-treino-card">
      <div style={{display:'flex',justifyContent:'center',gap:'0.5rem',flexWrap:'wrap',marginBottom:'1rem'}}>
        <div className="fr-toggle">
          <button className={mode==='fr-num'?'active':''} onClick={() => setMode('fr-num')}>FR → Número</button>
          <button className={mode==='num-fr'?'active':''} onClick={() => setMode('num-fr')}>Número → FR</button>
        </div>
        <div className="fr-toggle">
          <button className={range===20?'active':''} onClick={() => setRange(20)}>0–20</button>
          <button className={range===99?'active':''} onClick={() => setRange(99)}>0–99</button>
          <button className={range===999?'active':''} onClick={() => setRange(999)}>0–999</button>
          <button className={range===9999?'active':''} onClick={() => setRange(9999)}>0–9999</button>
        </div>
      </div>
      {mode === 'fr-num' ? (
        <React.Fragment>
          <div className="fr-num-kb-prompt">{q.correctFr} <SpeakBtn text={q.correctFr} /></div>
          <p className="fr-treino-pt-hint">Que número é em algarismos?</p>
          <div className="fr-num-options">
            {q.options.map((opt, i) => {
              const correct = picked !== null && opt === q.n;
              const wrong = picked === opt && opt !== q.n;
              return (
                <button key={i} className={`fr-num-option ${correct?'correct':''} ${wrong?'wrong':''}`} onClick={() => escolher(opt)} disabled={picked !== null}>
                  {opt}
                </button>
              );
            })}
          </div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="fr-num-display">{q.n}</div>
          <p className="fr-treino-pt-hint">Como se diz em francês?</p>
          <div className="fr-num-options">
            {q.options.map((opt, i) => {
              const optFr = traduzirNumero(opt);
              const correct = picked !== null && opt === q.n;
              const wrong = picked === opt && opt !== q.n;
              return (
                <button key={i} className={`fr-num-option ${correct?'correct':''} ${wrong?'wrong':''}`} onClick={() => escolher(opt)} disabled={picked !== null}>
                  {optFr}
                </button>
              );
            })}
          </div>
        </React.Fragment>
      )}
      {picked !== null && (
        <div className={`fr-treino-feedback ${picked === q.n ? 'correct' : 'wrong'}`}>
          {picked === q.n ? '✓ Bravo!' : `✗ Resposta: ${q.n} = ${q.correctFr}`}
          <SpeakBtn text={q.correctFr} />
        </div>
      )}
    </div>
  );
}

              <button className="fr-musica-aula-header" onClick={() => setOpenId(isOpen ? null : m.id)}>
                <div className="fr-musica-aula-num">M{m.aula + 1}</div>
                <div className="fr-musica-aula-info">
                  <div className="fr-musica-aula-titulo">{m.titulo} <span style={{color:'var(--mute)',fontWeight:400,fontSize:'0.8rem'}}>({m.ano})</span></div>
                  <div className="fr-musica-aula-artista">{m.artista} · {m.tituloPt}</div>
                </div>
                <div className="fr-musica-aula-arrow">{isOpen ? '▲' : '▼'}</div>
              </button>
              {isOpen && (
                <div className="fr-musica-aula-body">
                  <p style={{color:'var(--ink-soft)',fontSize:'0.92rem',marginTop:'0.5rem'}}>{m.sobre}</p>
                  <div className="fr-musica-yt-row">
                    <a className="fr-yt-link" href={m.yt} target="_blank" rel="noopener">▶ Ver no YouTube</a>
                    <a className="fr-btn fr-btn-primary" href={m.letra} target="_blank" rel="noopener" style={{textDecoration:'none'}}>📜 Letra completa em Paroles.net</a>
                  </div>
                  {temLetra ? (
                    <React.Fragment>
                      <h4 style={{fontFamily:"'Fraunces',serif",color:'var(--accent)',margin:'1.5rem 0 0.5rem',fontSize:'1rem'}}>📝 Letra · Tradução</h4>
                      <div className="fr-letra-table">
                        <div className="fr-letra-head-spk"></div>
                        <div className="fr-letra-head-fr">Français</div>
                        <div className="fr-letra-head-pt">Português</div>
                        {letra.map((l, i) => (
                          <React.Fragment key={i}>
                            <div><SpeakBtn text={l.fr} /></div>
                            <div className="fr-letra-fr">{l.fr}</div>
                            <div className="fr-letra-pt">{l.pt}</div>
                          </React.Fragment>
                        ))}
                      </div>
                      <button className="fr-btn" style={{marginTop:'0.85rem'}} onClick={() => {
                        // Lê a letra inteira, verso a verso, com pausa
                        letra.forEach((l, i) => setTimeout(() => speak(l.fr), i * 2800));
                      }}>🔊 Ouvir letra inteira</button>
                    </React.Fragment>
                  ) : (
                    <div style={{padding:'0.85rem 1rem',background:'rgba(200,156,79,0.1)',border:'1px dashed var(--gold)',borderRadius:'6px',fontSize:'0.88rem',color:'var(--ink-soft)',lineHeight:'1.55',marginTop:'0.75rem'}}>
                      💡 <strong>Como adicionar a letra aqui:</strong><br/>
                      1. Clica em <strong>📜 Letra completa em Paroles.net</strong> e copia a letra.<br/>
                      2. Abre o ficheiro <code style={{background:'rgba(0,0,0,0.05)',padding:'1px 6px',borderRadius:'3px'}}>index.html</code> num editor de texto.<br/>
                      3. Procura por <code style={{background:'rgba(0,0,0,0.05)',padding:'1px 6px',borderRadius:'3px'}}>"{m.id}"</code> dentro de <code style={{background:'rgba(0,0,0,0.05)',padding:'1px 6px',borderRadius:'3px'}}>const LETRAS</code> (linha ~600).<br/>
                      4. Substitui <code style={{background:'rgba(0,0,0,0.05)',padding:'1px 6px',borderRadius:'3px'}}>[ ]</code> por versos no formato:<br/>
                      <code style={{display:'block',background:'rgba(0,0,0,0.05)',padding:'0.5rem',borderRadius:'4px',marginTop:'0.4rem',fontSize:'0.85rem'}}>
                        {`"${m.id}": [`}<br/>
                        &nbsp;&nbsp;{'{ fr: "verso em francês", pt: "tradução em português" },'}<br/>
                        &nbsp;&nbsp;{'{ fr: "outro verso", pt: "outra tradução" },'}<br/>
                        {`],`}
                      </code>
                      5. Recarrega esta página — vais ver a letra com 🔊 em cada linha.
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Progresso({ progress, reset, userLevel, openLevel }) {
  const [confirm, setConfirm] = useState(false);
  const pool = vocabUpToAula(userLevel);
  const pct = pool.length > 0 ? Math.round((progress.studiedCards.length / pool.length) * 100) : 0;
  const ts = progress.treinoStats;
  const tsPct = ts.total > 0 ? Math.round((ts.correct / ts.total) * 100) : 0;
  return (
    <div>
      <PageHeader title="Progresso" sub="Vê o teu progresso e histórico de quizzes." userLevel={userLevel} openLevel={openLevel} />
      <section className="fr-stats">
        <div className="fr-stat">
          <div className="fr-stat-value">{progress.studiedCards.length}/{pool.length}</div>
          <div className="fr-stat-label">Palavras vistas</div>
          <div className="fr-bar"><div className="fr-bar-fill" style={{width:`${pct}%`}} /></div>
          <div className="fr-stat-pct">{pct}%</div>
        </div>
        <div className="fr-stat">
          <div className="fr-stat-value">{progress.quizScores.length}</div>
          <div className="fr-stat-label">Quizzes feitos</div>
        </div>
        <div className="fr-stat">
          <div className="fr-stat-value">{tsPct}%</div>
          <div className="fr-stat-label">Treino — taxa de acerto</div>
          <div className="fr-stat-pct">{ts.correct} acertos em {ts.total}</div>
        </div>
      </section>
      <h3 className="fr-section-title">Histórico de quizzes</h3>
      {progress.quizScores.length === 0 ? <p className="fr-empty">Ainda não fizeste nenhum quiz.</p> : (
        <div className="fr-quiz-history">
          {progress.quizScores.slice().reverse().map((q, i) => {
            const d = new Date(q.date);
            const dateStr = d.toLocaleDateString('pt-PT') + ' ' + d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
            return (
              <div key={i} className="fr-quiz-history-item">
                <span>{dateStr}</span>
                <span className="fr-quiz-history-score">{q.score} / {q.total} · {Math.round(q.score/q.total*100)}%</span>
              </div>
            );
          })}
        </div>
      )}
      <h3 className="fr-section-title">Reiniciar progresso</h3>
      {!confirm ? (
        <button className="fr-btn fr-btn-danger" onClick={() => setConfirm(true)}>Apagar todo o meu progresso</button>
      ) : (
        <div className="fr-confirm">
          <p>Tens a certeza? Vais perder cartões vistos e histórico de quizzes.</p>
          <button className="fr-btn fr-btn-danger" onClick={() => { reset(); setConfirm(false); }}>Sim, apagar</button>
          <button className="fr-btn" onClick={() => setConfirm(false)}>Cancelar</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
