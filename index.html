  delete(key) { localStorage.removeItem(key); }
};

// ==================== TTS (TEXT-TO-SPEECH) ====================
let _voiceFR = null;
function pickFrenchVoice() {
  if (_voiceFR) return _voiceFR;
  const voices = speechSynthesis.getVoices();
  // Priorizar Amélie/Thomas (macOS) ou qualquer fr-FR
  _voiceFR = voices.find(v => /amelie|thomas|aurelie/i.test(v.name) && v.lang.startsWith('fr'))
          || voices.find(v => v.lang === 'fr-FR')
          || voices.find(v => v.lang.startsWith('fr'))
          || null;
  return _voiceFR;
}
if (typeof speechSynthesis !== 'undefined') {
  speechSynthesis.onvoiceschanged = () => { _voiceFR = null; pickFrenchVoice(); };
  pickFrenchVoice();
}
function speak(text, opts={}) {
  if (!text || typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();
  // remover marcadores markdown e parênteses meta
  const clean = String(text).replace(/\*+/g, '').replace(/\(.*?\)/g, '').replace(/\/.*$/, '').trim();
  if (!clean) return;
  const u = new SpeechSynthesisUtterance(clean);
  u.lang = 'fr-FR';
  u.rate = opts.rate || 0.85;
  u.pitch = opts.pitch || 1;
  const v = pickFrenchVoice();
  if (v) u.voice = v;
  speechSynthesis.speak(u);
}
function SpeakBtn({ text, size }) {
  const cls = "fr-speak-btn" + (size === 'big' ? ' fr-speak-big' : '');
  return (
    <button className={cls} onClick={(e) => { e.stopPropagation(); speak(text); }} title="Ouvir pronúncia" aria-label="Ouvir">
      🔊
    </button>
  );
}

function conjugarRegular(verbo) {
  const grupo = verbo.grupo, r = verbo.inf;
  if (grupo === 1) {
    const raiz = r.replace(/er$/, '');
    const isGer = raiz.endsWith('g');
    const isCer = raiz.endsWith('c');
    const presNous = isGer ? raiz + "eons" : (isCer ? raiz.slice(0,-1) + "çons" : raiz + "ons");
    return {
      presente: { je: raiz+"e", tu: raiz+"es", il: raiz+"e", nous: presNous, vous: raiz+"ez", ils: raiz+"ent" },
      passado: { je: "ai "+raiz+"é", tu: "as "+raiz+"é", il: "a "+raiz+"é", nous: "avons "+raiz+"é", vous: "avez "+raiz+"é", ils: "ont "+raiz+"é" },
      imparfait: { je: raiz+"ais", tu: raiz+"ais", il: raiz+"ait", nous: raiz+"ions", vous: raiz+"iez", ils: raiz+"aient" },
      futuro: { je: raiz+"erai", tu: raiz+"eras", il: raiz+"era", nous: raiz+"erons", vous: raiz+"erez", ils: raiz+"eront" }
    };
  }
  if (grupo === 2) {
    const raiz = r.replace(/ir$/, '');
    return {
      presente: { je: raiz+"is", tu: raiz+"is", il: raiz+"it", nous: raiz+"issons", vous: raiz+"issez", ils: raiz+"issent" },
      passado: { je: "ai "+raiz+"i", tu: "as "+raiz+"i", il: "a "+raiz+"i", nous: "avons "+raiz+"i", vous: "avez "+raiz+"i", ils: "ont "+raiz+"i" },
      imparfait: { je: raiz+"issais", tu: raiz+"issais", il: raiz+"issait", nous: raiz+"issions", vous: raiz+"issiez", ils: raiz+"issaient" },
      futuro: { je: raiz+"irai", tu: raiz+"iras", il: raiz+"ira", nous: raiz+"irons", vous: raiz+"irez", ils: raiz+"iront" }
    };
  }
  return null;
}
function conjugar(verbo) { return CONJ_IRREG[verbo.inf] || conjugarRegular(verbo); }

  const t = ["", "", "vingt", "trente", "quarante", "cinquante", "soixante"];
  if (n < 10) return u[n];
  if (n < 20) return t10[n - 10];
  if (n < 70) {
    const d = Math.floor(n / 10), un = n % 10;
    if (un === 0) return t[d];
    if (un === 1) return t[d] + " et un";
    return t[d] + "-" + u[un];
  }
  if (n < 80) {
    const rest = n - 60;
    if (rest === 11) return "soixante et onze";
    return "soixante-" + t10[rest - 10];
  }
  if (n < 100) {
    const rest = n - 80;
    if (rest === 0) return "quatre-vingts";
    if (rest < 10) return "quatre-vingt-" + u[rest];
    return "quatre-vingt-" + t10[rest - 10];
  }
  return "cent";
}

const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);

function useNoRepeat(pool, historyCap) {
  const cap = historyCap || Math.max(3, Math.floor(pool.length / 2));
  const histRef = useRef([]);
  const next = () => {
    if (!pool.length) return null;
    const avail = pool.filter(p => !histRef.current.includes(p.fr));
    const arr = avail.length ? avail : pool;
    const pick = arr[Math.floor(Math.random() * arr.length)];
    histRef.current.push(pick.fr);
    if (histRef.current.length > cap) histRef.current.shift();
    return pick;
  };
  const nextN = (n) => shuffle(pool).slice(0, n);
  return { next, nextN };
}

function dicaInteligente(target) {
  const word = target.fr.split(/[\/,]/)[0].trim();
  const first = word.charAt(0);
  const masked = first + word.slice(1).replace(/[^\s]/g, '_');
  return {
    texto: 'Começa por "' + first + '" · ' + word.length + ' letras',
    palavra: masked
  };
}

// ==================== COMPONENTES ====================
function App() {
  const [view, setView] = useState('home');
  const [selectedAulaN, setSelectedAulaN] = useState(null);
  const [progress, setProgress] = useState({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 } });
  const [userName, setUserNameState] = useState('');
  const [userLevel, setUserLevelState] = useState(null);
  const [showNamePrompt, setShowNamePrompt] = useState(false);
  const [showLevelPrompt, setShowLevelPrompt] = useState(false);

  useEffect(() => {
    const p = storage.get('fr_progress');
    if (p) try { setProgress({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 }, ...JSON.parse(p) }); } catch(e) {}
    const n = storage.get('fr_userName');
    const l = storage.get('fr_userLevel');
    if (n) setUserNameState(n); else setShowNamePrompt(true);
    if (l !== null && l !== undefined) setUserLevelState(parseInt(l, 10));
    else if (n) setShowLevelPrompt(true);
  }, []);

  const setUserName = (n) => { setUserNameState(n); storage.set('fr_userName', n); };
  const setUserLevel = (l) => { setUserLevelState(l); storage.set('fr_userLevel', l); };
  const saveProgress = (np) => { setProgress(np); storage.set('fr_progress', JSON.stringify(np)); };
  const markCard = (key) => {
    if (!progress.studiedCards.includes(key)) saveProgress({ ...progress, studiedCards: [...progress.studiedCards, key] });
  };
  const recordQuiz = (score, total) => saveProgress({ ...progress, quizScores: [...progress.quizScores, { score, total, date: new Date().toISOString() }] });
  const recordTreino = (acerto) => saveProgress({ ...progress, treinoStats: { correct: progress.treinoStats.correct + (acerto?1:0), total: progress.treinoStats.total + 1 } });
  const resetAll = () => { storage.delete('fr_progress'); setProgress({ studiedCards: [], quizScores: [], treinoStats: { correct: 0, total: 0 } }); };

  const level = userLevel === null || userLevel === undefined ? 0 : userLevel;
  const openLevel = () => setShowLevelPrompt(true);

  return (
    <div className="fr-app">
      <style dangerouslySetInnerHTML={{__html: STYLES}} />
      {showNamePrompt && <NamePrompt onSave={(n) => { setUserName(n); setShowNamePrompt(false); setShowLevelPrompt(true); }} />}
      {!showNamePrompt && showLevelPrompt && (
        <LevelPrompt currentLevel={userLevel} onSave={(l) => { setUserLevel(l); setShowLevelPrompt(false); }} onClose={() => { if (userLevel === null || userLevel === undefined) setUserLevel(0); setShowLevelPrompt(false); }} />
      )}
      <Header view={view} setView={(v) => { setView(v); setSelectedAulaN(null); }} />
      <main className="fr-main">
        {view === 'home' && <Home setView={setView} progress={progress} userName={userName} userLevel={level} setUserName={setUserName} openLevel={openLevel} setSelectedAulaN={(n) => { setSelectedAulaN(n); setView('aula'); }} />}
        {view === 'aulas' && <AulasList userLevel={level} setSelectedAulaN={(n) => { setSelectedAulaN(n); setView('aula'); }} openLevel={openLevel} />}
        {view === 'aula' && selectedAulaN !== null && <AulaDetail aula={AULAS[selectedAulaN]} back={() => setView('aulas')} userLevel={level} isLocked={selectedAulaN > level} setSelectedAulaN={setSelectedAulaN} openLevel={openLevel} setUserLevel={setUserLevel} />}
        {view === 'flashcards' && <Flashcards markCard={markCard} studied={progress.studiedCards} userLevel={level} openLevel={openLevel} />}

function Flashcards({ markCard, studied, userLevel, openLevel }) {

  const [flipped, setFlipped] = useState(false);
  const [shuffleKey, setShuffleKey] = useState(0);

  const pool = useMemo(() => {
    const base = vocabUpToAula(userLevel);
    const filtered = category === 'all' ? base : base.filter(v => v.categoria === category);
    return shuffleKey >= 0 ? shuffle(filtered) : filtered;
  }, [category, userLevel, shuffleKey]);

  const cats = Array.from(new Set(vocabUpToAula(userLevel).map(v => v.categoria)));
  const card = pool[idx % Math.max(pool.length, 1)];

  useEffect(() => { setIdx(0); setFlipped(false); }, [category, direction, shuffleKey]);

  if (pool.length === 0) {
    return <div><PageHeader title="Flashcards" sub="Sem palavras nesta categoria." userLevel={userLevel} openLevel={openLevel} /></div>;
  }

  const next = () => { setFlipped(false); setIdx((idx + 1) % pool.length); if (card) markCard(card.fr); };
  const prev = () => { setFlipped(false); setIdx((idx - 1 + pool.length) % pool.length); };

  const frontText = direction === 'fr-pt' ? card.fr : card.pt;
  const backText = direction === 'fr-pt' ? card.pt : card.fr;
  const speakText = card.fr;

  return (
    <div>
      <PageHeader title="Flashcards" sub="Clica no cartão para virar. 🔊 toca a pronúncia em francês." userLevel={userLevel} openLevel={openLevel} />

            <option value="all">Todas ({vocabUpToAula(userLevel).length})</option>
            {cats.map(c => <option key={c} value={c}>{c} ({vocabUpToAula(userLevel).filter(v=>v.categoria===c).length})</option>)}

        <div className="fr-control-group">
          <label className="fr-label">Direção</label>
          <div className="fr-toggle">
            <button className={direction === 'fr-pt' ? 'active' : ''} onClick={() => setDirection('fr-pt')}>FR → PT</button>
            <button className={direction === 'pt-fr' ? 'active' : ''} onClick={() => setDirection('pt-fr')}>PT → FR</button>
          </div>
        </div>
      </div>
      <div className="fr-flash-area">
        <div className="fr-flash-meta">
          <span className="fr-tag">{idx + 1} / {pool.length}</span>
          <span className="fr-tag-cat">{card.categoria}</span>
          <span className="fr-tag-cat">Aula {card.aula}</span>

          <div className="fr-flash-inner">

              <div className="fr-flash-hint">{direction === 'fr-pt' ? 'Français' : 'Português'}</div>
              <div className="fr-flash-text">{frontText}</div>

function Quiz({ recordQuiz, userLevel, openLevel }) {
  const [stage, setStage] = useState('setup');
  const [direction, setDirection] = useState('fr-pt');
  const [questions, setQuestions] = useState([]);
  const [current, setCurrent] = useState(0);
  const [score, setScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [feedback, setFeedback] = useState(null);

  const start = () => {
    const pool = vocabUpToAula(userLevel);
    if (pool.length < 4) return;
    const sample = shuffle(pool).slice(0, Math.min(10, pool.length));
    const qs = sample.map(item => {
      const distractors = shuffle(pool.filter(v => v.fr !== item.fr)).slice(0, 3);
      const options = shuffle([...distractors, item]);
      return {
        prompt: direction === 'fr-pt' ? item.fr : item.pt,
        correct: direction === 'fr-pt' ? item.pt : item.fr,
        options: options.map(o => direction === 'fr-pt' ? o.pt : o.fr),
        item: item
      };
    });
    setQuestions(qs); setCurrent(0); setScore(0); setSelected(null); setFeedback(null); setStage('playing');
  };

  const answer = opt => {
    if (selected) return;
    setSelected(opt);
    const acertou = opt === questions[current].correct;
    if (acertou) { setScore(s => s + 1); setFeedback('correct'); } else setFeedback('wrong');
    setTimeout(() => nextQ(), acertou ? 1300 : 2200);
  };
  const nextQ = () => {
    setCurrent(c => {
      if (c + 1 >= questions.length) {
        setScore(s => { recordQuiz(s, questions.length); return s; });
        setStage('done');
        return c;
      }
      return c + 1;
    });
    setSelected(null); setFeedback(null);
  };

  if (stage === 'setup') {
    const pool = vocabUpToAula(userLevel);
    return (
      <div>
        <PageHeader title="Quiz" sub={`${Math.min(10, pool.length)} perguntas das aulas que já fizeste.`} userLevel={userLevel} openLevel={openLevel} />
        <div className="fr-controls">
          <div className="fr-control-group">
            <label className="fr-label">Direção</label>
            <div className="fr-toggle">
              <button className={direction === 'fr-pt' ? 'active' : ''} onClick={() => setDirection('fr-pt')}>FR → PT</button>
              <button className={direction === 'pt-fr' ? 'active' : ''} onClick={() => setDirection('pt-fr')}>PT → FR</button>
            </div>
          </div>
        </div>
        <button className="fr-btn fr-btn-primary fr-btn-big" onClick={start} disabled={pool.length < 4}>Começar quiz</button>
        {pool.length < 4 && <p style={{color:'var(--mute)',marginTop:'1rem'}}>Precisas de pelo menos 4 palavras para o quiz.</p>}
      </div>
    );
  }
  if (stage === 'done') {
    const pct = Math.round((score / questions.length) * 100);
    let msg;
    if (pct >= 90) msg = "Excellent! Quase perfeito.";
    else if (pct >= 70) msg = "Très bien! Continua assim.";
    else if (pct >= 50) msg = "Bon effort — revê os flashcards.";
    else msg = "Pas de stress — pratica mais e tenta de novo.";
    return (
      <div className="fr-quiz-done">
        <h2 className="fr-page-title" style={{textAlign:'center'}}>Résultat</h2>
        <div className="fr-result-score">{score}<span>/{questions.length}</span></div>
        <div className="fr-result-pct">{pct}%</div>
        <p className="fr-result-msg">{msg}</p>
        <div style={{display:'flex',gap:'0.5rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button className="fr-btn fr-btn-primary" onClick={start}>Novo quiz</button>
          <button className="fr-btn" onClick={() => setStage('setup')}>Voltar</button>
        </div>
      </div>
    );
  }
  const q = questions[current];
  return (
    <div>
      <div className="fr-quiz-meta"><span>Pergunta {current + 1} de {questions.length}</span><span>Acertos: {score}</span></div>
      <div className="fr-quiz-bar"><div className="fr-quiz-bar-fill" style={{width:`${(current / questions.length) * 100}%`}} /></div>
      <div className="fr-quiz-card">
        <div className="fr-quiz-hint">Qual a tradução de:</div>
        <div className="fr-quiz-prompt">
          {q.prompt}
          {direction === 'fr-pt' && <SpeakBtn text={q.item.fr} />}
        </div>
        <div className="fr-quiz-options">
          {q.options.map((opt, i) => {
            const correct = selected && opt === q.correct;
            const wrong = selected === opt && opt !== q.correct;
            return (
              <button key={i} className={`fr-quiz-option ${correct ? 'correct' : ''} ${wrong ? 'wrong' : ''} ${selected ? 'disabled' : ''}`} onClick={() => answer(opt)} disabled={!!selected}>
                {String.fromCharCode(65 + i)}. {opt}
                {direction === 'pt-fr' && selected && opt === q.correct && ' '}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TreinoEmoji({ pool, recordTreino }) {
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const isVisual = v => typeof v.emoji === 'string' && !v.emoji.startsWith('txt:');
  const visualPool = useMemo(() => pool.filter(isVisual), [pool]);
  const { next: nextTarget } = useNoRepeat(visualPool);
  const gerar = () => {
    if (visualPool.length < 4) return;
    const target = nextTarget();
    if (!target) return;
    const distractors = shuffle(pool.filter(v => v.fr !== target.fr)).slice(0, 3);
    const options = shuffle([...distractors, target]);
    setQ({ target, options, dica: dicaInteligente(target) });
    setPicked(null); setShowHint(false);
  };
  useEffect(() => { gerar(); }, []);
  if (!q) return <div className="fr-treino-card"><p>Sem palavras visuais suficientes.</p></div>;
  const escolher = (opt) => {
    if (picked) return;
    setPicked(opt.fr);
    recordTreino(opt.fr === q.target.fr);
    if (opt.fr === q.target.fr) speak(q.target.fr);
    setTimeout(() => gerar(), 1600);
  };
  return (
    <div className="fr-treino-card">
      <div className="fr-treino-emoji-big"><EmojiOrText value={q.target.emoji} size="big" /></div>
      <p className="fr-treino-question">Que palavra é esta em francês?</p>
      {showHint ? (
        <div className="fr-treino-hint-shown">💡 {q.dica.texto}<div className="fr-dica-palavra">{q.dica.palavra}</div></div>
      ) : !picked && <button className="fr-btn fr-btn-small fr-hint-btn" onClick={() => setShowHint(true)}>💡 Mostrar dica</button>}
      <div className="fr-quiz-options" style={{maxWidth:'460px',margin:'1rem auto 0'}}>
        {q.options.map((opt, i) => {
          const correct = picked && opt.fr === q.target.fr;
          const wrong = picked === opt.fr && opt.fr !== q.target.fr;
          return (
            <button key={i} className={`fr-quiz-option ${correct?'correct':''} ${wrong?'wrong':''} ${picked?'disabled':''}`} onClick={() => escolher(opt)} disabled={!!picked}>
              {opt.fr}
            </button>
          );
        })}
      </div>
      {picked && (
        <div className={`fr-treino-feedback ${picked === q.target.fr ? 'correct' : 'wrong'}`}>
          {picked === q.target.fr ? '✓ Boa!' : `✗ Era: ${q.target.fr}`}
          <SpeakBtn text={q.target.fr} />
          <small>{q.target.fr} = {q.target.pt}</small>
        </div>
      )}
      <div className="fr-treino-actions">
        <button className="fr-btn" onClick={gerar}>{picked ? 'Próxima →' : '⏭️ Saltar'}</button>
      </div>
    </div>
  );
}

function TreinoWrite({ pool, recordTreino }) {
  const [q, setQ] = useState(null);
  const [valor, setValor] = useState('');
  const [feedback, setFeedback] = useState(null);
  const [showHint, setShowHint] = useState(false);
  const { next } = useNoRepeat(pool);
  const gerar = () => { const t = next(); if (!t) return; setQ({...t, dica: dicaInteligente(t)}); setValor(''); setFeedback(null); setShowHint(false); };
  useEffect(() => { gerar(); }, []);
  if (!q) return null;
  const normalizar = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z]/g, '').trim();
  const verificar = () => {
    if (!valor.trim()) return;
    const variantes = q.fr.split(/[\/,]/).map(s => normalizar(s));
    const resp = normalizar(valor);
    const acertou = variantes.includes(resp);
    setFeedback(acertou ? 'correct' : 'wrong');
    recordTreino(acertou);
    if (acertou) speak(q.fr);
    setTimeout(() => gerar(), 2500);
  };
  return (
    <div className="fr-treino-card">
      {typeof q.emoji === 'string' && !q.emoji.startsWith('txt:') && <div className="fr-treino-emoji-big">{q.emoji}</div>}
      <p className="fr-treino-question">Como se diz "{q.pt}" em francês?</p>
      <p className="fr-treino-pt-hint">Aula {q.aula}</p>
      {showHint ? (
        <div className="fr-treino-hint-shown">💡 {q.dica.texto}<div className="fr-dica-palavra">{q.dica.palavra}</div></div>
      ) : !feedback && <button className="fr-btn fr-btn-small fr-hint-btn" onClick={() => setShowHint(true)}>💡 Dica</button>}
      <input className="fr-treino-input" autoFocus value={valor} onChange={e => setValor(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !feedback) verificar(); }} placeholder="escreve em francês…" disabled={!!feedback} />
      {feedback && (
        <div className={`fr-treino-feedback ${feedback}`}>
          {feedback === 'correct' ? '✓ Correto!' : `✗ Resposta: ${q.fr}`}
          <SpeakBtn text={q.fr} />
          <small>{q.fr} = {q.pt}</small>
        </div>
      )}
      <div className="fr-treino-actions">
        {!feedback && (
          <React.Fragment>
            <button className="fr-btn fr-btn-primary" onClick={verificar} disabled={!valor.trim()}>Confirmar</button>
            <button className="fr-btn" onClick={gerar}>⏭️ Saltar</button>
          </React.Fragment>
        )}
        {feedback && <button className="fr-btn" onClick={gerar}>Próxima →</button>}
      </div>
    </div>
  );
}

function TreinoMatch({ pool, recordTreino }) {
  const [pares, setPares] = useState([]);
  const [colA, setColA] = useState([]);
  const [colB, setColB] = useState([]);
  const [selA, setSelA] = useState(null);
  const [selB, setSelB] = useState(null);
  const [matched, setMatched] = useState({});
  const [wrong, setWrong] = useState(null);
  const { nextN } = useNoRepeat(pool);
  const gerar = () => {
    const escolhidos = nextN(4);
    if (escolhidos.length < 4) return;
    setPares(escolhidos);
    setColA(shuffle(escolhidos.map(p => ({key: p.fr, label: p.fr, emoji: p.emoji}))));
    setColB(shuffle(escolhidos.map(p => ({key: p.fr, label: p.pt, emoji: p.emoji}))));
    setSelA(null); setSelB(null); setMatched({}); setWrong(null);
  };
  useEffect(() => { gerar(); }, []);
  useEffect(() => {
    if (selA && selB) {
      if (selA === selB) {
        setMatched(m => ({...m, [selA]: true}));
        recordTreino(true);
        speak(selA);
        setSelA(null); setSelB(null);
      } else {
        recordTreino(false);
        setWrong({ a: selA, b: selB });
        setTimeout(() => { setSelA(null); setSelB(null); setWrong(null); }, 700);
      }
    }
  }, [selA, selB]);
  const totMatch = Object.keys(matched).length;
  const completo = totMatch === pares.length && pares.length > 0;
  useEffect(() => {
    if (completo) {
      const t = setTimeout(() => gerar(), 1800);
      return () => clearTimeout(t);
    }
  }, [completo]);
  return (
    <div className="fr-treino-card" style={{textAlign:'left'}}>
      <p style={{textAlign:'center',color:'var(--mute)',fontSize:'0.92rem',marginTop:0}}>
        Associa cada palavra em <strong style={{color:'var(--accent)'}}>francês</strong> à sua tradução em <strong>português</strong>.
      </p>
      <div className="fr-match-grid">
        <div className="fr-match-col-head">Français</div>
        <div className="fr-match-col-head">Português</div>
        {[0,1,2,3].map(rowIdx => {
          const itA = colA[rowIdx], itB = colB[rowIdx];
          if (!itA || !itB) return null;
          const aMatched = matched[itA.key], aSelected = selA === itA.key, aWrong = wrong && wrong.a === itA.key;
          const bMatched = matched[itB.key], bSelected = selB === itB.key, bWrong = wrong && wrong.b === itB.key;
          return (
            <React.Fragment key={rowIdx}>
              <button className={`fr-match-cell fr ${aMatched?'matched':''} ${aSelected?'selected':''} ${aWrong?'wrong':''}`} disabled={aMatched} onClick={() => !aMatched && setSelA(itA.key)}>
                <span className="fr-match-text">{itA.label}</span>
              </button>
              <button className={`fr-match-cell ${bMatched?'matched':''} ${bSelected?'selected':''} ${bWrong?'wrong':''}`} disabled={bMatched} onClick={() => !bMatched && setSelB(itB.key)}>
                <span className="fr-match-text">{itB.label}</span>
              </button>
            </React.Fragment>
          );
        })}
      </div>
      <div style={{textAlign:'center',marginTop:'1rem'}}>
        <p style={{color:'var(--mute)',fontSize:'0.85rem'}}>{totMatch}/{pares.length} pares</p>
        {completo && <p style={{color:'var(--correct)',fontWeight:600,marginBottom:'0.85rem'}}>✓ Completaste! Próxima ronda…</p>}
        <button className="fr-btn" onClick={gerar}>{completo ? 'Próxima →' : '🔄 Baralhar'}</button>
      </div>
    </div>
  );
}

function TreinoNumeros({ recordTreino, userLevel }) {
  const [mode, setMode] = useState('fr-num'); // fr-num (mostra francês → escolher número) | num-fr (mostra número → escolher francês)
  const [range, setRange] = useState(userLevel >= 1 ? 99 : 20);
  const [q, setQ] = useState(null);
  const [picked, setPicked] = useState(null);
  const histRef = useRef([]);
  const gerar = () => {
    let n;
    let tries = 0;
    do { n = Math.floor(Math.random() * (range + 1)); tries++; } while (histRef.current.includes(n) && tries < 30);
    histRef.current.push(n); if (histRef.current.length > 8) histRef.current.shift();
    const correctFr = traduzirNumero(n);
    // Generate distractors
    const distractors = [];
    while (distractors.length < 3) {
      const d = Math.floor(Math.random() * (range + 1));
      if (d !== n && !distractors.includes(d)) distractors.push(d);
    }
    const options = shuffle([n, ...distractors]);
    setQ({ n, correctFr, options });
    setPicked(null);
  };
  useEffect(() => { gerar(); }, [range, mode]);
  if (!q) return null;
  const escolher = (val) => {
    if (picked !== null) return;
    const acerto = mode === 'fr-num' ? (val === q.n) : (val === q.n);
    setPicked(val);
    recordTreino(acerto);
    if (acerto) speak(q.correctFr);
    setTimeout(() => gerar(), 1500);
  };
  return (
    <div className="fr-treino-card">
      <div style={{display:'flex',justifyContent:'center',gap:'0.5rem',flexWrap:'wrap',marginBottom:'1rem'}}>
        <div className="fr-toggle">
          <button className={mode==='fr-num'?'active':''} onClick={() => setMode('fr-num')}>FR → Número</button>
          <button className={mode==='num-fr'?'active':''} onClick={() => setMode('num-fr')}>Número → FR</button>
        </div>
        <div className="fr-toggle">
          <button className={range===20?'active':''} onClick={() => setRange(20)}>0-20</button>
          <button className={range===99?'active':''} onClick={() => setRange(99)}>0-99</button>
        </div>
      </div>
      {mode === 'fr-num' ? (
        <React.Fragment>
          <div className="fr-num-kb-prompt">{q.correctFr} <SpeakBtn text={q.correctFr} /></div>
          <p className="fr-treino-pt-hint">Que número é em algarismos?</p>
          <div className="fr-num-options">
            {q.options.map((opt, i) => {
              const correct = picked !== null && opt === q.n;
              const wrong = picked === opt && opt !== q.n;
              return (
                <button key={i} className={`fr-num-option ${correct?'correct':''} ${wrong?'wrong':''}`} onClick={() => escolher(opt)} disabled={picked !== null}>
                  {opt}
                </button>
              );
            })}
          </div>
        </React.Fragment>
      ) : (
        <React.Fragment>
          <div className="fr-num-display">{q.n}</div>
          <p className="fr-treino-pt-hint">Como se diz em francês?</p>
          <div className="fr-num-options">
            {q.options.map((opt, i) => {
              const optFr = traduzirNumero(opt);
              const correct = picked !== null && opt === q.n;
              const wrong = picked === opt && opt !== q.n;
              return (
                <button key={i} className={`fr-num-option ${correct?'correct':''} ${wrong?'wrong':''}`} onClick={() => escolher(opt)} disabled={picked !== null}>
                  {optFr}
                </button>
              );
            })}
          </div>
        </React.Fragment>
      )}
      {picked !== null && (
        <div className={`fr-treino-feedback ${picked === q.n ? 'correct' : 'wrong'}`}>
          {picked === q.n ? '✓ Bravo!' : `✗ Resposta: ${q.n} = ${q.correctFr}`}
          <SpeakBtn text={q.correctFr} />
        </div>
      )}
    </div>
  );
}

function Musicas({ userLevel, openLevel }) {
  const [openAula, setOpenAula] = useState(null);
  const musicasD = MUSICAS.filter(m => m.aula <= userLevel);
  return (
    <div>
      <PageHeader title="Música francesa" sub="Clássicos e atuais. Clica numa linha para ouvir 🔊." userLevel={userLevel} openLevel={openLevel} />
      {musicasD.length === 0 && <div className="fr-empty">Sem músicas neste nível.</div>}
      <div className="fr-musica-acordeao">
        {musicasD.map(m => {
          const isOpen = openAula === m.aula;
          const letra = LETRAS[m.aula] || [];
          return (
            <div key={m.aula} className={`fr-musica-aula-card ${isOpen?'open':''}`}>
              <button className="fr-musica-aula-header" onClick={() => setOpenAula(isOpen ? null : m.aula)}>
                <div className="fr-musica-aula-num">{m.aula}</div>
                <div className="fr-musica-aula-info">
                  <div className="fr-musica-aula-titulo">{m.titulo}</div>
                  <div className="fr-musica-aula-artista">{m.artista} · {m.tituloPt}</div>
                </div>
                <div className="fr-musica-aula-arrow">{isOpen ? '▲' : '▼'}</div>
              </button>
              {isOpen && (
                <div className="fr-musica-aula-body">
                  <div className="fr-musica-yt-row">
                    <a className="fr-yt-link" href={m.yt} target="_blank" rel="noopener">▶ Procurar no YouTube</a>
                    <button className="fr-btn fr-btn-small" onClick={() => letra.forEach((l, i) => setTimeout(() => speak(l.fr), i * 2200))}>🔊 Ler letra inteira</button>
                  </div>
                  {letra.length > 0 && (
                    <div className="fr-letra-table">
                      <div className="fr-letra-head-spk"></div>
                      <div className="fr-letra-head-fr">Français</div>
                      <div className="fr-letra-head-pt">Português</div>
                      {letra.map((l, i) => (
                        <React.Fragment key={i}>
                          <div><SpeakBtn text={l.fr} /></div>
                          <div className="fr-letra-fr">{l.fr}</div>
                          <div className="fr-letra-pt">{l.pt}</div>
                        </React.Fragment>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Pronuncia({ userLevel, openLevel }) {
  return (
    <div>
      <PageHeader title="Pronúncia · Phonétique" sub="Regras essenciais para falares francês. Clica 🔊 para ouvir cada exemplo." userLevel={userLevel} openLevel={openLevel} />
      <div className="fr-prof-card">
        <div className="fr-prof-icon">🇫🇷</div>
        <h3>Dica de ouro</h3>
        <p>O francês escreve muito mais do que pronuncia. <strong>Muitas letras no final das palavras são mudas</strong> (especialmente -E, -S, -T, -D). Mas há excepções: o famoso <strong>CaReFuL</strong> (C, R, F, L falam-se no final).</p>
      </div>
      <h3 className="fr-section-title">Letras mudas no final</h3>
      <div className="fr-fon-grid">
        <div className="fr-fon-card">
          <h4>🤐 Mudas</h4>
          <div className="fr-fon-list">
            {FONETICA.finalMudo.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="fr-fon-card">
          <h4>🗣️ Faladas — CaReFuL</h4>
          <div className="fr-fon-list">
            {FONETICA.finalFalado.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <h3 className="fr-section-title">Vogais</h3>
      <div className="fr-fon-grid">
        <div className="fr-fon-card">
          <h4>Vogais básicas</h4>
          <div className="fr-fon-list">
            {FONETICA.vogais.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="fr-fon-card">
          <h4>Sons nasais</h4>
          <div className="fr-fon-list">
            {FONETICA.nasais.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <h3 className="fr-section-title">Consoantes e combinações</h3>
      <div className="fr-fon-grid">
        <div className="fr-fon-card">
          <h4>Consoantes especiais</h4>
          <div className="fr-fon-list">
            {FONETICA.consoantes.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>

        </div>
        <div className="fr-fon-card">
          <h4>Combinações importantes</h4>
          <div className="fr-fon-list">
            {FONETICA.combinacoes.map((r, i) => (
              <div key={i} className="fr-fon-row">
                <div className="fr-fon-letra">{r.letra}</div>
                <div className="fr-fon-som">{r.som}</div>
                <SpeakBtn text={r.ex.split('(')[0].trim()} />
                <div className="fr-fon-ex">ex: {r.ex}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <h3 className="fr-section-title">Dicas para praticar</h3>
      <div className="fr-prof-card">
        <p style={{textAlign:'left'}}>
          <strong>1.</strong> Treina o <strong>R gutural</strong> — vem da garganta, como um leve gargarejo.<br/>
          <strong>2.</strong> O <strong>U francês</strong> não é "u" português — arredonda os lábios como para dizer "o" mas diz "i".<br/>
          <strong>3.</strong> O <strong>H é sempre mudo</strong>: <em>hôtel</em> = "otél", <em>homme</em> = "om".<br/>
          <strong>4.</strong> <strong>Liaison</strong>: quando uma palavra termina em consoante muda e a seguinte começa em vogal, liga-se: <em>les_amis</em> = "lezami".<br/>

function Progresso({ progress, reset, userLevel, openLevel }) {
  const [confirm, setConfirm] = useState(false);
  const pool = vocabUpToAula(userLevel);
  const pct = pool.length > 0 ? Math.round((progress.studiedCards.length / pool.length) * 100) : 0;
  const ts = progress.treinoStats;
  const tsPct = ts.total > 0 ? Math.round((ts.correct / ts.total) * 100) : 0;
  return (
    <div>
      <PageHeader title="Progresso" sub="Vê o teu progresso e histórico de quizzes." userLevel={userLevel} openLevel={openLevel} />
      <section className="fr-stats">
        <div className="fr-stat">
          <div className="fr-stat-value">{progress.studiedCards.length}/{pool.length}</div>
          <div className="fr-stat-label">Palavras vistas</div>
          <div className="fr-bar"><div className="fr-bar-fill" style={{width:`${pct}%`}} /></div>
          <div className="fr-stat-pct">{pct}%</div>
        </div>
        <div className="fr-stat">
          <div className="fr-stat-value">{progress.quizScores.length}</div>
          <div className="fr-stat-label">Quizzes feitos</div>
        </div>
        <div className="fr-stat">
          <div className="fr-stat-value">{tsPct}%</div>
          <div className="fr-stat-label">Treino — taxa de acerto</div>
          <div className="fr-stat-pct">{ts.correct} acertos em {ts.total}</div>
        </div>
      </section>
      <h3 className="fr-section-title">Histórico de quizzes</h3>
      {progress.quizScores.length === 0 ? <p className="fr-empty">Ainda não fizeste nenhum quiz.</p> : (
        <div className="fr-quiz-history">
          {progress.quizScores.slice().reverse().map((q, i) => {
            const d = new Date(q.date);
            const dateStr = d.toLocaleDateString('pt-PT') + ' ' + d.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
            return (
              <div key={i} className="fr-quiz-history-item">
                <span>{dateStr}</span>
                <span className="fr-quiz-history-score">{q.score} / {q.total} · {Math.round(q.score/q.total*100)}%</span>
              </div>
            );
          })}
        </div>
      )}
      <h3 className="fr-section-title">Reiniciar progresso</h3>
      {!confirm ? (
        <button className="fr-btn fr-btn-danger" onClick={() => setConfirm(true)}>Apagar todo o meu progresso</button>
      ) : (
        <div className="fr-confirm">
          <p>Tens a certeza? Vais perder cartões vistos e histórico de quizzes.</p>
          <button className="fr-btn fr-btn-danger" onClick={() => { reset(); setConfirm(false); }}>Sim, apagar</button>
          <button className="fr-btn" onClick={() => setConfirm(false)}>Cancelar</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
