<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudar Francês — Apostila Interativa</title>
<style>
  :root{
    --bleu:#0055A4; --rouge:#EF4135; --blanc:#FFFFFF;
    --bg:#f7f7fb; --ink:#1a1a2e; --muted:#6b7280; --card:#ffffff;
    --accent:#0055A4; --good:#15803d; --bad:#b91c1c; --warn:#b45309;
    --border:#e5e7eb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  header{background:linear-gradient(90deg,#0055A4,#1d4ed8,#EF4135);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  header h1{margin:0;font-size:1.2rem;font-weight:700;letter-spacing:.3px}
  header h1 span{opacity:.85;font-weight:400;font-size:.9rem;margin-left:8px}
  .modes{display:flex;gap:6px;background:rgba(255,255,255,.15);padding:4px;border-radius:10px}
  .modes button{background:transparent;border:0;color:#fff;padding:8px 12px;border-radius:7px;cursor:pointer;font-weight:600;font-size:.85rem}
  .modes button.active{background:#fff;color:var(--bleu)}
  .layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 68px)}
  aside{background:#fff;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 68px);position:sticky;top:0}
  .search{padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:5}
  .search input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.9rem}
  .module-block{padding:6px 0}
  .module-title{padding:10px 14px 4px;font-size:.75rem;font-weight:700;color:var(--bleu);text-transform:uppercase;letter-spacing:.6px}
  .lesson-item{padding:8px 14px;cursor:pointer;font-size:.85rem;border-left:3px solid transparent;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .lesson-item:hover{background:#f3f4f6}
  .lesson-item.active{background:#eff6ff;border-left-color:var(--bleu);font-weight:600;color:var(--bleu)}
  .lesson-num{color:var(--muted);font-size:.75rem;flex-shrink:0}
  main{padding:24px 32px;overflow-x:hidden;max-width:100%}
  .lesson-header{margin-bottom:20px}
  .lesson-header .crumb{font-size:.8rem;color:var(--muted)}
  .lesson-header h2{margin:6px 0 4px;font-size:1.5rem;color:var(--bleu)}
  .lesson-header .fr{color:var(--muted);font-style:italic}
  section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 22px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  section h3{margin:0 0 12px;color:var(--bleu);font-size:1.05rem;display:flex;align-items:center;gap:8px}
  section h3::before{content:"";width:4px;height:18px;background:var(--rouge);border-radius:2px}
  .grammar{font-size:.95rem}
  .grammar p{margin:8px 0}
  .grammar ul{padding-left:18px;margin:8px 0}
  .grammar li{margin:4px 0}
  .grammar code, .ex-fr code{background:#fef3c7;padding:1px 6px;border-radius:4px;font-family:inherit;color:#92400e;font-weight:600}
  table.conj{width:100%;border-collapse:collapse;font-size:.9rem;margin:6px 0}
  table.conj th, table.conj td{padding:6px 10px;border:1px solid var(--border);text-align:left}
  table.conj th{background:#f3f4f6;font-weight:600;width:30%}
  table.conj td.fr{color:var(--bleu);font-weight:600}
  .conj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
  .conj-card{border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:#fafbff}
  .conj-card .verb{font-weight:700;color:var(--rouge);font-size:1rem}
  .conj-card .meaning{color:var(--muted);font-size:.8rem;margin-bottom:6px}
  .conj-card table{font-size:.85rem;width:100%;border-collapse:collapse}
  .conj-card td{padding:3px 4px}
  .conj-card td:first-child{color:var(--muted);width:35%}
  .conj-card td:last-child{font-weight:600;color:var(--bleu)}
  .vocab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
  .vocab-item{background:#fafbff;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.9rem}
  .vocab-item .fr{font-weight:600;color:var(--bleu)}
  .vocab-item .pt{color:var(--ink);opacity:.85;font-size:.85rem}
  .examples{display:flex;flex-direction:column;gap:8px}
  .example{padding:10px 14px;background:#fafbff;border-left:3px solid var(--bleu);border-radius:0 8px 8px 0}
  .example .ex-fr{font-weight:500}
  .example .ex-pt{color:var(--muted);font-size:.85rem;margin-top:3px}
  /* Quiz */
  .quiz-q{margin-bottom:16px;padding:14px;background:#fafbff;border-radius:10px;border:1px solid var(--border)}
  .quiz-q .q-text{font-weight:600;margin-bottom:10px}
  .quiz-q .options{display:flex;flex-direction:column;gap:6px}
  .quiz-q .opt{padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:.9rem;transition:.15s;text-align:left;width:100%}
  .quiz-q .opt:hover{border-color:var(--bleu);background:#eff6ff}
  .quiz-q .opt.correct{background:#dcfce7;border-color:var(--good);color:var(--good);font-weight:600}
  .quiz-q .opt.wrong{background:#fee2e2;border-color:var(--bad);color:var(--bad)}
  .quiz-q .explain{margin-top:8px;padding:8px 12px;background:#fffbeb;border-radius:6px;font-size:.85rem;color:#92400e;display:none}
  .quiz-q.answered .explain{display:block}
  .quiz-summary{padding:14px;background:linear-gradient(90deg,#0055A4,#1d4ed8);color:#fff;border-radius:10px;font-weight:600;margin-top:10px}
  /* Flashcards */
  .flash-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px 0}
  .flashcard{width:100%;max-width:520px;height:240px;perspective:1200px;cursor:pointer}
  .flash-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .5s}
  .flashcard.flipped .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;padding:24px;backface-visibility:hidden;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.08);border:1px solid var(--border)}
  .flash-front{background:linear-gradient(135deg,#fff,#eff6ff)}
  .flash-back{background:linear-gradient(135deg,#0055A4,#1d4ed8);color:#fff;transform:rotateY(180deg)}
  .flash-face .word{font-size:1.8rem;font-weight:700}
  .flash-face .hint{font-size:.85rem;opacity:.7;margin-top:8px}
  .flash-back .word{color:#fff}
  .flash-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-weight:600;font-size:.9rem}
  .btn:hover{background:#f3f4f6}
  .btn.primary{background:var(--bleu);color:#fff;border-color:var(--bleu)}
  .btn.primary:hover{background:#003d7a}
  .btn.danger{background:#fee2e2;color:var(--bad);border-color:#fecaca}
  .btn.good{background:#dcfce7;color:var(--good);border-color:#bbf7d0}
  .flash-progress{font-size:.85rem;color:var(--muted)}
  .flash-filter{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--muted);flex-wrap:wrap;justify-content:center}
  .flash-filter select{padding:6px 10px;border:1px solid var(--border);border-radius:6px}
  /* Conjugator */
  .conj-test{max-width:600px;margin:0 auto}
  .conj-prompt{font-size:1.2rem;text-align:center;padding:20px;background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:14px}
  .conj-prompt .verb-name{color:var(--rouge);font-weight:700}
  .conj-prompt .pronoun{color:var(--bleu);font-weight:700}
  .conj-input{width:100%;padding:14px;font-size:1.1rem;border:2px solid var(--border);border-radius:10px;text-align:center;margin-bottom:10px}
  .conj-input:focus{outline:none;border-color:var(--bleu)}
  .conj-feedback{padding:12px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:600;display:none}
  .conj-feedback.ok{background:#dcfce7;color:var(--good);display:block}
  .conj-feedback.ko{background:#fee2e2;color:var(--bad);display:block}
  .conj-score{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:10px}
  .verb-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;justify-content:center}
  .verb-picker label{padding:5px 10px;background:#fff;border:1px solid var(--border);border-radius:6px;font-size:.8rem;cursor:pointer}
  .verb-picker input{margin-right:5px}
  .verb-picker label.on{background:var(--bleu);color:#fff;border-color:var(--bleu)}
  /* Responsive */
  @media (max-width:900px){
    .layout{grid-template-columns:1fr}
    aside{position:fixed;top:68px;left:-100%;width:80%;max-width:300px;height:calc(100vh - 68px);z-index:50;transition:left .3s;box-shadow:2px 0 12px rgba(0,0,0,.1)}
    aside.open{left:0}
    main{padding:18px 16px}
    .menu-toggle{display:inline-block}
    header h1{font-size:1rem}
    .conj-grid{grid-template-columns:1fr}
  }
  .menu-toggle{display:none;background:rgba(255,255,255,.15);border:0;color:#fff;padding:8px 12px;border-radius:7px;cursor:pointer;font-weight:600;font-size:.85rem}
  @media (max-width:900px){.menu-toggle{display:inline-block}}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .tag{display:inline-block;padding:2px 8px;background:#eff6ff;color:var(--bleu);border-radius:10px;font-size:.7rem;font-weight:600;margin-left:6px}
  .pron{color:var(--muted);font-size:.8rem;font-style:italic}
</style>
</head>
<body>
<header>
  <h1>🇫🇷 Estudar Francês <span>— 52 leçons</span></h1>
  <button class="menu-toggle" id="menuBtn">☰ Lições</button>
  <div class="modes">
    <button data-mode="learn" class="active">📖 Aprender</button>
    <button data-mode="flash">🎴 Flashcards</button>
    <button data-mode="quiz">❓ Quiz</button>
    <button data-mode="conj">✍️ Conjugar</button>
  </div>
</header>
<div class="layout">
  <aside id="sidebar">
    <div class="search"><input id="searchBox" placeholder="🔍 Procurar lição ou tópico..."></div>
    <div id="lessonList"></div>
  </aside>
  <main id="mainContent"></main>
</div>

<script>
// =====================================================
// DADOS — 52 LIÇÕES
// =====================================================
const LESSONS = [
  // ============ MODULE 1 ============
  {
    id:1, mod:1, t:"Pronomes sujeito · Presente do indicativo",
    tFr:"Pronoms sujets. Présent de l'indicatif",
    grammar:`<p><b>Pronomes pessoais sujeito</b> em francês:</p>
    <ul>
      <li><code>Je</code> = Eu (vira <code>J'</code> antes de vogal: <i>J'habite</i>)</li>
      <li><code>Tu</code> = Tu / Você (informal)</li>
      <li><code>Il / Elle / On</code> = Ele / Ela / A gente</li>
      <li><code>Nous</code> = Nós · <code>Vous</code> = Vós/Vocês/Você formal</li>
      <li><code>Ils / Elles</code> = Eles / Elas</li>
    </ul>
    <p><b>Verbos do 1º grupo (-ER)</b> — retiras o -ER e adicionas: <code>-e, -es, -e, -ons, -ez, -ent</code>. As terminações <i>-e, -es, -e, -ent</i> são silenciosas!</p>`,
    conj:[
      {v:"habiter", m:"morar", f:{je:"habite",tu:"habites",il:"habite",nous:"habitons",vous:"habitez",ils:"habitent"}},
      {v:"parler", m:"falar", f:{je:"parle",tu:"parles",il:"parle",nous:"parlons",vous:"parlez",ils:"parlent"}},
      {v:"voyager", m:"viajar", f:{je:"voyage",tu:"voyages",il:"voyage",nous:"voyageons",vous:"voyagez",ils:"voyagent"}}
    ],
    vocab:[
      {fr:"habiter",pt:"morar"},{fr:"parler",pt:"falar"},{fr:"voyager",pt:"viajar"},
      {fr:"souvent",pt:"frequentemente"},{fr:"aussi",pt:"também"},{fr:"français",pt:"francês"}
    ],
    ex:[
      {fr:"J'habite à São Paulo.",pt:"Eu moro em São Paulo."},
      {fr:"Tu parles français?",pt:"Você fala francês?"},
      {fr:"Nous voyageons à Paris.",pt:"Nós viajamos a Paris."}
    ],
    quiz:[
      {q:"Tu ____ français.",o:["parle","parles","parlez","parlent"],a:1,e:"Tu + verbo -ER leva sempre -es"},
      {q:"J' ____ à Rome.",o:["habites","habite","habitons","habitent"],a:1,e:"Je → -e; antes de vogal vira J'"},
      {q:"Elles ____ au Brésil.",o:["voyage","voyages","voyagez","voyagent"],a:3,e:"Ils/Elles → -ent (silencioso)"}
    ]
  },
  {
    id:2, mod:1, t:"Perguntas · Negação · Verbo ÊTRE",
    tFr:"Poser une question. La négation. Verbe être",
    grammar:`<p><b>Verbo ÊTRE (=ser/estar)</b> — irregular, decora!</p>
    <p><b>Negação:</b> coloca-se <code>ne … pas</code> em torno do verbo. Antes de vogal, <code>ne</code> vira <code>n'</code>.<br>
    <i>Je ne parle pas français.</i> · <i>Il n'est pas content.</i></p>
    <p><b>Perguntas — 3 maneiras:</b></p>
    <ul>
      <li>Entonação: <i>Tu es français?</i> (informal)</li>
      <li>Est-ce que: <i>Est-ce que tu es français?</i> (neutro)</li>
      <li>Inversão: <i>Es-tu français?</i> (formal)</li>
    </ul>`,
    conj:[{v:"être", m:"ser/estar", f:{je:"suis",tu:"es",il:"est",nous:"sommes",vous:"êtes",ils:"sont"}}],
    vocab:[
      {fr:"content/contente",pt:"contente"},{fr:"heureux/heureuse",pt:"feliz"},
      {fr:"intelligent(e)",pt:"inteligente"},{fr:"patient(e)",pt:"paciente"},
      {fr:"gentil(le)",pt:"gentil"},{fr:"marié(e)",pt:"casado(a)"},
      {fr:"célibataire",pt:"solteiro(a)"},{fr:"divorcé(e)",pt:"divorciado(a)"}
    ],
    ex:[
      {fr:"Je ne suis pas français.",pt:"Eu não sou francês."},
      {fr:"Est-ce que vous êtes contents?",pt:"Vocês estão contentes?"},
      {fr:"Nous sommes en vacances.",pt:"Estamos de férias."}
    ],
    quiz:[
      {q:"Nous ____ heureux.",o:["sont","sommes","êtes","est"],a:1,e:"Nous sommes"},
      {q:"Negativo de \"Il parle italien\":",o:["Il pas parle italien","Il parle ne pas italien","Il ne parle pas italien","Il n'parle pas italien"],a:2,e:"ne + verbo + pas"},
      {q:"Vous ____ professeurs?",o:["es","est","êtes","sont"],a:2,e:"Vous êtes"}
    ]
  },
  {
    id:3, mod:1, t:"Artigos definidos e indefinidos · Il y a",
    tFr:"L'article indéfini, l'article défini. Il y a/il n'y a pas",
    grammar:`<p><b>Artigos definidos</b> (o/a/os/as):</p>
    <ul>
      <li><code>le</code> — masculino: <i>le café</i></li>
      <li><code>la</code> — feminino: <i>la maison</i></li>
      <li><code>l'</code> — antes de vogal/h mudo: <i>l'hôtel, l'avenue</i></li>
      <li><code>les</code> — plural: <i>les amis</i></li>
    </ul>
    <p><b>Artigos indefinidos</b> (um/uma/uns/umas):</p>
    <ul>
      <li><code>un</code> (masc.) · <code>une</code> (fem.) · <code>des</code> (plural)</li>
    </ul>
    <p><b>Il y a</b> = há / existe (singular ou plural).<br>
    Negação: <code>il n'y a pas de</code> + nome (sem artigo!).<br>
    <i>Il y a un café. → Il n'y a pas <b>de</b> café.</i></p>`,
    vocab:[
      {fr:"un chien",pt:"um cão"},{fr:"une chatte",pt:"uma gata"},
      {fr:"des canaris",pt:"uns canários"},{fr:"un lapin",pt:"um coelho"},
      {fr:"la banque",pt:"o banco"},{fr:"l'immeuble",pt:"o prédio"},
      {fr:"la rue",pt:"a rua"},{fr:"le quartier",pt:"o bairro"},
      {fr:"un embouteillage",pt:"um engarrafamento"}
    ],
    ex:[
      {fr:"J'ai un chien et des canaris.",pt:"Tenho um cão e uns canários."},
      {fr:"Il y a des cafés sympathiques.",pt:"Há cafés simpáticos."},
      {fr:"Il n'y a pas de bière ici.",pt:"Não tem cerveja aqui."}
    ],
    quiz:[
      {q:"____ hôtel de Castiglione",o:["Le","La","L'","Les"],a:2,e:"hôtel começa com h mudo → l'"},
      {q:"J'ai ____ chatte.",o:["un","une","des","la"],a:1,e:"chatte é feminino → une"},
      {q:"Negativo de \"Il y a un problème\":",o:["Il n'y a pas un problème","Il n'y a pas de problème","Il y a pas de problème","Il n'a pas de problème"],a:1,e:"Na negação, un/une/des → de"}
    ]
  },
  {
    id:4, mod:1, t:"Verbos -ER (Parte II) · C'est, Ce sont",
    tFr:"Présent de l'indicatif: verbes du premier groupe (Partie II). C'est, ce sont",
    grammar:`<p>Mais verbos do 1º grupo: <b>écouter</b> (ouvir), <b>aimer</b> (gostar/amar), <b>regarder</b> (assistir/olhar), <b>manger</b> (comer).</p>
    <p><b>C'est</b> (= é/este é) — usado para <i>identificar</i> uma coisa/pessoa:<br>
    <i>C'est la Tour Eiffel. C'est mon ami.</i></p>
    <p><b>Ce sont</b> = são (plural): <i>Ce sont mes amis.</i></p>
    <p>⚠️ Diferença: <i>Il est professeur</i> (profissão, sem artigo) vs <i>C'est un professeur</i> (com artigo).</p>`,
    conj:[
      {v:"écouter", m:"ouvir/escutar", f:{je:"écoute",tu:"écoutes",il:"écoute",nous:"écoutons",vous:"écoutez",ils:"écoutent"}},
      {v:"aimer", m:"amar/gostar", f:{je:"aime",tu:"aimes",il:"aime",nous:"aimons",vous:"aimez",ils:"aiment"}},
      {v:"manger", m:"comer", f:{je:"mange",tu:"manges",il:"mange",nous:"mangeons",vous:"mangez",ils:"mangent"}}
    ],
    vocab:[
      {fr:"écouter",pt:"ouvir"},{fr:"aimer",pt:"amar/gostar"},
      {fr:"adorer",pt:"adorar"},{fr:"détester",pt:"detestar"},
      {fr:"regarder",pt:"assistir"},{fr:"chanter",pt:"cantar"},
      {fr:"danser",pt:"dançar"},{fr:"travailler",pt:"trabalhar"}
    ],
    ex:[
      {fr:"C'est la Tour Eiffel.",pt:"É a Torre Eiffel."},
      {fr:"J'aime la musique française.",pt:"Eu gosto da música francesa."},
      {fr:"Ce sont mes amis.",pt:"São meus amigos."}
    ],
    quiz:[
      {q:"____ un musée. (singular)",o:["Il est","C'est","Ce sont","Elle est"],a:1,e:"C'est + artigo para identificar"},
      {q:"Nous ____ une pizza.",o:["mange","manges","mangeons","mangez"],a:2,e:"manger → nous mangeons (mantém -e antes de -ons)"},
      {q:"Vous ____ la musique.",o:["écoute","écoutes","écoutez","écoutent"],a:2,e:"Vous écoutez"}
    ]
  },
  {
    id:5, mod:1, t:"Palavras interrogativas · AVOIR · CONNAÎTRE · DE",
    tFr:"Mots interrogatifs. Verbes avoir et connaître. Proposition DE",
    grammar:`<p><b>Palavras interrogativas:</b></p>
    <ul>
      <li><code>Qui?</code> = Quem?</li>
      <li><code>Que / Qu'est-ce que?</code> = O quê?</li>
      <li><code>Quand?</code> = Quando?</li>
      <li><code>Où?</code> = Onde?</li>
      <li><code>Pourquoi?</code> = Porquê?</li>
      <li><code>Comment?</code> = Como?</li>
      <li><code>Combien?</code> = Quanto(s)?</li>
      <li><code>Quel(le)?</code> = Qual?</li>
    </ul>
    <p><b>DE</b> = de, indica posse/origem:<br>
    <i>la maison <b>de</b> Paul</i>, <i>le livre <b>de</b> français</i>.<br>
    Contrai com artigo: <code>de + le = du</code>, <code>de + les = des</code>.</p>`,
    conj:[
      {v:"avoir", m:"ter", f:{je:"ai",tu:"as",il:"a",nous:"avons",vous:"avez",ils:"ont"}},
      {v:"connaître", m:"conhecer", f:{je:"connais",tu:"connais",il:"connaît",nous:"connaissons",vous:"connaissez",ils:"connaissent"}}
    ],
    vocab:[
      {fr:"avoir faim",pt:"estar com fome"},{fr:"avoir soif",pt:"estar com sede"},
      {fr:"avoir chaud",pt:"estar com calor"},{fr:"avoir froid",pt:"estar com frio"},
      {fr:"avoir … ans",pt:"ter … anos"},{fr:"connaître",pt:"conhecer"}
    ],
    ex:[
      {fr:"Tu as quel âge?",pt:"Quantos anos tens?"},
      {fr:"Où est-ce que tu habites?",pt:"Onde moras?"},
      {fr:"Je connais Paris.",pt:"Conheço Paris."}
    ],
    quiz:[
      {q:"____ tu travailles? (Onde)",o:["Quand","Où","Qui","Comment"],a:1,e:"Où = onde"},

    grammar:`<p>O <b>passé composé</b> = passado mais usado em francês oral. Equivale a <i>"eu falei / eu tenho falado"</i>.</p>

    <ul>
      <li>Verbos -ER → -<b>é</b>: parler → parl<b>é</b></li>

      <li>Verbos -RE → -<b>u</b>: vendre → vend<b>u</b></li>
      <li>Irregulares: <i>avoir→eu, être→été, faire→fait, voir→vu, prendre→pris</i></li>

  {
    id:13, mod:1, t:"Comparativos e superlativos",
    tFr:"Comparatifs et superlatifs",
    grammar:`<p><b>Comparativos</b> (com adjetivos/advérbios):</p>
    <ul>
      <li><code>plus + adj + que</code> = mais … que: <i>Il est <b>plus</b> grand <b>que</b> moi.</i></li>
      <li><code>moins + adj + que</code> = menos … que</li>
      <li><code>aussi + adj + que</code> = tão … como</li>
    </ul>
    <p><b>Irregulares:</b> <i>bon → meilleur</i>, <i>bien → mieux</i>.</p>
    <p><b>Superlativos:</b></p>
    <ul>
      <li><code>le/la/les plus + adj</code> = o mais …</li>
      <li><code>le/la/les moins + adj</code> = o menos …</li>
    </ul>
    <p><i>C'est <b>le plus</b> grand musée <b>de</b> Paris.</i></p>`,

    ex:[

    grammar:`<p>O <b>partitivo</b> indica uma <i>quantidade indeterminada</i> (≈ "do/da" em português):</p>

    grammar:`<p><b>Conectores avançados:</b></p>

    grammar:`<p>Três tipos de hipóteses com <code>si</code>:</p>

    grammar:`<p>Quando o verbo introdutor está no <b>passado</b>, os tempos da fala mudam:</p>

    quiz:[
      {q:"Subjuntivo de \"être\" (que tu):",o:["sois","es","sera","était"],a:0,e:"que tu sois"},
      {q:"Subjuntivo de \"aller\" (que nous):",o:["allions","ayons","irions","ayions"],a:0,e:"que nous allions"},
      {q:"Subjuntivo de \"faire\" (qu'ils):",o:["font","fassent","fissent","feront"],a:1,e:"qu'ils fassent"}
    ]
  },
  {
    id:51, mod:4, t:"Pronomes relativos (qui, que, dont, où)",
    tFr:"Pronoms relatifs",
    grammar:`<p>Relativos simples — ligam duas frases:</p>
    <ul>
      <li><code>qui</code> = sujeito da oração subordinada: <i>L'homme <b>qui</b> parle.</i></li>
      <li><code>que</code> = COD: <i>Le livre <b>que</b> je lis.</i></li>
      <li><code>dont</code> = complemento com <code>de</code>: <i>Le livre <b>dont</b> je parle.</i></li>
      <li><code>où</code> = lugar/tempo: <i>La ville <b>où</b> je vis. Le jour <b>où</b> je suis né.</i></li>
    </ul>
    <p>⚠️ "que" elide-se antes de vogal: <i>l'homme <b>qu'</b>il connaît</i>. "qui" nunca elide.</p>`,
    vocab:[
      {fr:"qui",pt:"que (sujeito)"},{fr:"que",pt:"que (objeto)"},
      {fr:"dont",pt:"de que / cujo"},{fr:"où",pt:"onde / quando"}
    ],
    ex:[
      {fr:"L'ami qui habite à Paris.",pt:"O amigo que mora em Paris."},
      {fr:"Le film que j'ai vu.",pt:"O filme que vi."},
      {fr:"La maison dont j'ai parlé.",pt:"A casa de que falei."}
    ],
    quiz:[
      {q:"\"O homem que fala\":",o:["L'homme que parle","L'homme qui parle","L'homme dont parle","L'homme où parle"],a:1,e:"sujeito → qui"},
      {q:"\"O livro que leio\":",o:["Le livre qui je lis","Le livre que je lis","Le livre dont je lis","Le livre où je lis"],a:1,e:"COD → que"},
      {q:"\"A loja onde compro\":",o:["Le magasin que j'achète","Le magasin qui j'achète","Le magasin où j'achète","Le magasin dont j'achète"],a:2,e:"lugar → où"}
    ]
  },
  {
    id:52, mod:4, t:"Le passé simple",
    tFr:"Le passé simple",
    grammar:`<p>O <b>passé simple</b> = passado <b>literário</b> (livros, contos, jornais formais). Não se usa na conversa — equivale ao passé composé.</p>
    <p><b>Formação:</b></p>
    <ul>
      <li>Verbos -ER: <i>parl<b>ai</b>, parl<b>as</b>, parl<b>a</b>, parl<b>âmes</b>, parl<b>âtes</b>, parl<b>èrent</b></i></li>
      <li>Verbos -IR / -RE: <i>fin<b>is</b>, fin<b>is</b>, fin<b>it</b>, fin<b>îmes</b>, fin<b>îtes</b>, fin<b>irent</b></i></li>
    </ul>
    <p>Irregulares comuns:</p>
    <ul>
      <li>être → <i>je fus, tu fus, il fut, nous fûmes...</i></li>
      <li>avoir → <i>j'eus, tu eus, il eut, nous eûmes...</i></li>
      <li>faire → <i>je fis, il fit, ils firent</i></li>
      <li>venir → <i>je vins, il vint, ils vinrent</i></li>
    </ul>
    <p>Forma mais comum em leitura: <b>3ª pessoa</b> (il/elle/ils/elles).</p>`,
    vocab:[
      {fr:"il fut",pt:"foi (ser, literário)"},{fr:"elle eut",pt:"teve (literário)"},
      {fr:"ils dirent",pt:"disseram"},{fr:"il vint",pt:"veio"}
    ],
    ex:[
      {fr:"Il fut roi pendant 20 ans.",pt:"Foi rei durante 20 anos."},
      {fr:"Ils arrivèrent au château.",pt:"Chegaram ao castelo."},
      {fr:"Elle eut une idée.",pt:"Teve uma ideia."}
    ],
    quiz:[
      {q:"Passé simple é usado em:",o:["conversação","romances/contos","emails","redes sociais"],a:1,e:"Registro literário"},
      {q:"Passé simple de \"être\" (il):",o:["fut","était","a été","est"],a:0,e:"il fut"},
      {q:"Passé simple de \"parler\" (il):",o:["parle","parla","parlait","parlé"],a:1,e:"il parla (-a)"}
    ]
  }
];

// =====================================================
// APLICAÇÃO
// =====================================================
let currentMode = 'learn';
let currentLessonId = 1;
let flashState = { idx: 0, deck: [], lessonFilter: 'all' };
let quizState = {};
let conjState = { idx: 0, score: 0, total: 0, verbs: [], currentTask: null };

const PRONOUNS = [
  {key:'je', label:'Je / J\''},
  {key:'tu', label:'Tu'},
  {key:'il', label:'Il / Elle'},
  {key:'nous', label:'Nous'},
  {key:'vous', label:'Vous'},
  {key:'ils', label:'Ils / Elles'}
];

const MODULE_TITLES = {
  1: "Módulo 1 · Básico (lições 1-16)",
  2: "Módulo 2 · Intermediário (17-32)",
  3: "Módulo 3 · Avançado (33-42)",
  4: "Módulo 4 · Avançado+ (43-52)"
};

function renderSidebar(filter=''){
  const list = document.getElementById('lessonList');
  list.innerHTML='';
  const f = filter.toLowerCase().trim();
  for(let mod=1; mod<=4; mod++){
    const lessons = LESSONS.filter(l=>l.mod===mod && (
      !f || l.t.toLowerCase().includes(f) || l.tFr.toLowerCase().includes(f) ||
      (l.grammar||'').toLowerCase().includes(f) ||
      (l.vocab||[]).some(v=>v.fr.toLowerCase().includes(f)||v.pt.toLowerCase().includes(f))
    ));
    if(!lessons.length) continue;
    const block = document.createElement('div');
    block.className='module-block';
    block.innerHTML=`<div class="module-title">${MODULE_TITLES[mod]}</div>`;
    lessons.forEach(l=>{
      const div=document.createElement('div');
      div.className='lesson-item'+(l.id===currentLessonId?' active':'');
      div.innerHTML=`<span>${l.t}</span><span class="lesson-num">L${l.id}</span>`;
      div.onclick=()=>{currentLessonId=l.id;renderMain();renderSidebar(document.getElementById('searchBox').value);
        if(window.innerWidth<=900){document.getElementById('sidebar').classList.remove('open');}};
      block.appendChild(div);
    });
    list.appendChild(block);
  }
}

function renderMain(){
  const main=document.getElementById('mainContent');
  if(currentMode==='learn') renderLearn(main);
  else if(currentMode==='flash') renderFlash(main);
  else if(currentMode==='quiz') renderQuiz(main);
  else if(currentMode==='conj') renderConj(main);
}

function renderLearn(main){
  const l = LESSONS.find(x=>x.id===currentLessonId);
  if(!l){main.innerHTML='<div class="empty">Seleciona uma lição</div>';return}
  let html=`<div class="lesson-header">
    <div class="crumb">Módulo ${l.mod} · Leçon ${l.id}</div>
    <h2>${l.t}</h2>
    <div class="fr">${l.tFr}</div>
  </div>`;
  html+=`<section><h3>📚 Gramática</h3><div class="grammar">${l.grammar}</div></section>`;
  if(l.conj && l.conj.length){
    html+=`<section><h3>🔄 Conjugações</h3><div class="conj-grid">`;
    l.conj.forEach(c=>{
      html+=`<div class="conj-card"><div class="verb">${c.v}</div><div class="meaning">${c.m}</div><table>`;
      PRONOUNS.forEach(p=>{
        if(c.f[p.key]) html+=`<tr><td>${p.label}</td><td>${c.f[p.key]}</td></tr>`;
      });
      html+=`</table></div>`;
    });
    html+=`</div></section>`;
  }
  if(l.vocab && l.vocab.length){
    html+=`<section><h3>💬 Vocabulário</h3><div class="vocab-grid">`;
    l.vocab.forEach(v=>{
      html+=`<div class="vocab-item"><div class="fr">${v.fr}</div><div class="pt">${v.pt}</div></div>`;
    });
    html+=`</div></section>`;
  }
  if(l.ex && l.ex.length){
    html+=`<section><h3>📝 Exemplos</h3><div class="examples">`;
    l.ex.forEach(e=>{
      html+=`<div class="example"><div class="ex-fr">${e.fr}</div><div class="ex-pt">${e.pt}</div></div>`;
    });
    html+=`</div></section>`;
  }
  if(l.quiz && l.quiz.length){
    html+=`<section><h3>❓ Mini-quiz</h3><div class="grammar"><p style="color:var(--muted)">Vai ao modo <b>Quiz</b> no topo para fazer perguntas desta lição.</p></div></section>`;
  }
  // navigation
  const prev=LESSONS.find(x=>x.id===l.id-1);
  const next=LESSONS.find(x=>x.id===l.id+1);
  html+=`<div style="display:flex;justify-content:space-between;gap:10px;margin-top:20px">`;
  html+= prev?`<button class="btn" onclick="currentLessonId=${prev.id};renderMain();renderSidebar(document.getElementById('searchBox').value);">⟵ ${prev.t}</button>`:`<span></span>`;
  html+= next?`<button class="btn primary" onclick="currentLessonId=${next.id};renderMain();renderSidebar(document.getElementById('searchBox').value);">${next.t} ⟶</button>`:`<span></span>`;
  html+=`</div>`;
  main.innerHTML=html;
}

function renderFlash(main){
  // collect vocab according to filter
  let deck=[];
  if(flashState.lessonFilter==='all'){
    LESSONS.forEach(l=>(l.vocab||[]).forEach(v=>deck.push({...v,lid:l.id,lt:l.t})));
  } else if(flashState.lessonFilter==='current'){
    const l=LESSONS.find(x=>x.id===currentLessonId);
    if(l)(l.vocab||[]).forEach(v=>deck.push({...v,lid:l.id,lt:l.t}));
  } else {
    const mod=+flashState.lessonFilter;
    LESSONS.filter(l=>l.mod===mod).forEach(l=>(l.vocab||[]).forEach(v=>deck.push({...v,lid:l.id,lt:l.t})));
  }
  if(flashState.deck.length===0||flashState.deck.length!==deck.length){
    flashState.deck=shuffle(deck);
    flashState.idx=0;
  }
  if(deck.length===0){
    main.innerHTML='<div class="empty">Sem vocabulário disponível</div>';return;
  }
  const card=flashState.deck[flashState.idx];
  let html=`<div class="lesson-header"><h2>🎴 Flashcards</h2><div class="fr">Clica no cartão para virar</div></div>`;
  html+=`<div class="flash-filter">
    Lições:
    <select id="flashFilter">
      <option value="all"${flashState.lessonFilter==='all'?' selected':''}>Todas as lições</option>
      <option value="current"${flashState.lessonFilter==='current'?' selected':''}>Lição atual (${currentLessonId})</option>
      <option value="1"${flashState.lessonFilter==='1'?' selected':''}>Módulo 1</option>
      <option value="2"${flashState.lessonFilter==='2'?' selected':''}>Módulo 2</option>
      <option value="3"${flashState.lessonFilter==='3'?' selected':''}>Módulo 3</option>
      <option value="4"${flashState.lessonFilter==='4'?' selected':''}>Módulo 4</option>
    </select>
    <span class="flash-progress">${flashState.idx+1} / ${flashState.deck.length}</span>
  </div>`;
  html+=`<div class="flash-wrap">
    <div class="flashcard" id="card">
      <div class="flash-inner">
        <div class="flash-face flash-front">
          <div class="word">${card.fr}</div>
          <div class="hint">Lição ${card.lid} · ${card.lt}<br>👆 Clica para revelar</div>
        </div>
        <div class="flash-face flash-back">
          <div class="word">${card.pt}</div>
          <div class="hint">${card.fr}</div>
        </div>
      </div>
    </div>
    <div class="flash-controls">
      <button class="btn" id="prevBtn">⟵ Anterior</button>
      <button class="btn primary" id="flipBtn">Virar</button>
      <button class="btn" id="nextBtn">Próximo ⟶</button>
      <button class="btn good" id="shuffleBtn">🔀 Baralhar</button>
    </div>
  </div>`;
  main.innerHTML=html;

  const cardEl=document.getElementById('card');
  cardEl.onclick=()=>cardEl.classList.toggle('flipped');
  document.getElementById('flipBtn').onclick=(e)=>{e.stopPropagation();cardEl.classList.toggle('flipped');};
  document.getElementById('prevBtn').onclick=()=>{flashState.idx=(flashState.idx-1+flashState.deck.length)%flashState.deck.length;renderFlash(main);};
  document.getElementById('nextBtn').onclick=()=>{flashState.idx=(flashState.idx+1)%flashState.deck.length;renderFlash(main);};
  document.getElementById('shuffleBtn').onclick=()=>{flashState.deck=shuffle(flashState.deck);flashState.idx=0;renderFlash(main);};
  document.getElementById('flashFilter').onchange=(e)=>{flashState.lessonFilter=e.target.value;flashState.deck=[];renderFlash(main);};
}

function renderQuiz(main){
  const l=LESSONS.find(x=>x.id===currentLessonId);
  if(!l || !l.quiz || !l.quiz.length){main.innerHTML='<div class="empty">Esta lição não tem quiz</div>';return}
  const stateKey='q'+l.id;
  if(!quizState[stateKey]) quizState[stateKey]={answers:{},score:0};
  const st=quizState[stateKey];
  let html=`<div class="lesson-header">
    <div class="crumb">Quiz · Lição ${l.id}</div>
    <h2>❓ ${l.t}</h2>
    <div class="fr">Escolhe a resposta correta — vê o feedback imediato</div>
  </div>`;
  l.quiz.forEach((q,i)=>{
    const answered=st.answers[i]!==undefined;
    html+=`<div class="quiz-q${answered?' answered':''}" data-i="${i}">
      <div class="q-text">${i+1}. ${q.q}</div>
      <div class="options">`;
    q.o.forEach((opt,oi)=>{
      let cls='opt';
      if(answered){
        if(oi===q.a) cls+=' correct';
        else if(oi===st.answers[i]) cls+=' wrong';
      }
      html+=`<button class="${cls}" onclick="answerQuiz(${l.id},${i},${oi})" ${answered?'disabled':''}>${String.fromCharCode(65+oi)}. ${opt}</button>`;
    });
    html+=`</div>
      <div class="explain">💡 ${q.e}</div>
    </div>`;
  });
  const total=l.quiz.length;
  const answeredCount=Object.keys(st.answers).length;
  if(answeredCount===total){
    html+=`<div class="quiz-summary">🎯 Pontuação: ${st.score} / ${total} (${Math.round(st.score/total*100)}%)
    <div style="margin-top:8px"><button class="btn" onclick="resetQuiz(${l.id})" style="background:#fff;color:var(--bleu)">Refazer</button></div></div>`;
  }
  main.innerHTML=html;
}
function answerQuiz(lid,qi,oi){
  const l=LESSONS.find(x=>x.id===lid);
  const st=quizState['q'+lid];
  if(st.answers[qi]!==undefined) return;
  st.answers[qi]=oi;
  if(oi===l.quiz[qi].a) st.score++;
  renderQuiz(document.getElementById('mainContent'));
}
function resetQuiz(lid){
  quizState['q'+lid]={answers:{},score:0};
  renderQuiz(document.getElementById('mainContent'));
}

function renderConj(main){
  // collect all conjugations
  const allVerbs=[];
  LESSONS.forEach(l=>(l.conj||[]).forEach(c=>{
    if(!c.v.includes('(')){ // skip imparfait/futur/subj duplicates
      allVerbs.push({...c, lid:l.id});
    }
  }));
  if(!conjState.verbs.length) conjState.verbs=allVerbs.map(v=>v.v);
  if(!conjState.currentTask) generateConjTask(allVerbs);
  const task=conjState.currentTask;
  if(!task){main.innerHTML='<div class="empty">Sem verbos disponíveis</div>';return}
  let html=`<div class="lesson-header"><h2>✍️ Conjugar</h2><div class="fr">Escreve a forma correta do verbo</div></div>`;
  html+=`<section><h3>Verbos a praticar</h3><div class="verb-picker">`;
  allVerbs.forEach(v=>{
    const on=conjState.verbs.includes(v.v);
    html+=`<label class="${on?'on':''}"><input type="checkbox" ${on?'checked':''} data-verb="${v.v}">${v.v}</label>`;
  });
  html+=`</div></section>`;
  html+=`<div class="conj-test">
    <div class="conj-score">Acertos: ${conjState.score} / ${conjState.total}</div>
    <div class="conj-prompt">
      Conjuga <span class="verb-name">${task.verb}</span> (${task.meaning})<br>
      → <span class="pronoun">${task.pronounLabel}</span> _____
    </div>
    <input type="text" class="conj-input" id="conjInput" placeholder="Escreve aqui..." autocomplete="off">
    <div class="conj-feedback" id="conjFb"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn primary" id="conjCheck">Verificar</button>
      <button class="btn" id="conjSkip">Saltar</button>
      <button class="btn good" id="conjReveal">Mostrar resposta</button>
    </div>
  </div>`;
  main.innerHTML=html;
  const input=document.getElementById('conjInput');
  input.focus();
  input.onkeydown=(e)=>{if(e.key==='Enter')checkConj(allVerbs)};
  document.getElementById('conjCheck').onclick=()=>checkConj(allVerbs);
  document.getElementById('conjSkip').onclick=()=>{generateConjTask(allVerbs);renderConj(main);};
  document.getElementById('conjReveal').onclick=()=>{
    document.getElementById('conjFb').className='conj-feedback ko';
    document.getElementById('conjFb').innerHTML=`Resposta: <b>${task.answer}</b>`;
  };
  // verb-picker handlers
  document.querySelectorAll('.verb-picker input').forEach(cb=>{
    cb.onchange=(e)=>{
      const v=e.target.dataset.verb;
      if(e.target.checked) conjState.verbs.push(v);
      else conjState.verbs=conjState.verbs.filter(x=>x!==v);
      generateConjTask(allVerbs);renderConj(main);
    };
  });
}
function generateConjTask(allVerbs){
  const filtered=allVerbs.filter(v=>conjState.verbs.includes(v.v));
  if(!filtered.length){conjState.currentTask=null;return}
  const v=filtered[Math.floor(Math.random()*filtered.length)];
  const keys=Object.keys(v.f);
  const k=keys[Math.floor(Math.random()*keys.length)];
  const p=PRONOUNS.find(x=>x.key===k);
  conjState.currentTask={verb:v.v,meaning:v.m,pronoun:k,pronounLabel:p?p.label:k,answer:v.f[k]};
}
function checkConj(allVerbs){
  const input=document.getElementById('conjInput');
  const fb=document.getElementById('conjFb');
  const ans=normalize(conjState.currentTask.answer);
  const got=normalize(input.value);
  conjState.total++;
  if(got===ans){
    conjState.score++;
    fb.className='conj-feedback ok';
    fb.innerHTML=`✅ Correto! <b>${conjState.currentTask.answer}</b>`;
    setTimeout(()=>{generateConjTask(allVerbs);renderConj(document.getElementById('mainContent'));},900);
  } else {
    fb.className='conj-feedback ko';
    fb.innerHTML=`❌ Errado. Resposta: <b>${conjState.currentTask.answer}</b> (escreveste "${input.value||'—'}")`;
    setTimeout(()=>{generateConjTask(allVerbs);renderConj(document.getElementById('mainContent'));},1800);
  }
}
function normalize(s){return (s||'').toLowerCase().trim().replace(/\s+/g,' ');}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

// Mode buttons
document.querySelectorAll('.modes button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.modes button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentMode=b.dataset.mode;
    if(currentMode==='flash'){flashState.deck=[];}
    if(currentMode==='conj'){conjState.currentTask=null;}
    renderMain();
  };
});
document.getElementById('searchBox').addEventListener('input',(e)=>renderSidebar(e.target.value));
document.getElementById('menuBtn').onclick=()=>document.getElementById('sidebar').classList.toggle('open');

// initial render
renderSidebar();
renderMain();
</script>
</body>
</html>
